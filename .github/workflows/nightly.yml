name: Nightly binary build

on:
  schedule:
    # 4:00 AM Pacific (UTC-7). GitHub Actions cron is UTC and does not
    # follow DST changes, so this is 11:00 UTC, which is 4:00 AM PDT and
    # 3:00 AM PST.
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  changes:
    name: Check for recent changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commits in last 24 hours
        id: check
        shell: bash
        run: |
          count=$(git log --since="24 hours ago" --oneline | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: Tastier-Windows-x64.zip
          - os: macos-latest
            asset: Tastier-macOS.zip

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller Tastier.spec

      - name: Package Windows binary
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $src = "dist\Tastier.exe"
          $dst = "${{ matrix.asset }}"
          Compress-Archive -Path $src -DestinationPath $dst -Force

      - name: Package macOS app
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r "../${{ matrix.asset }}" Tastier.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create nightly release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set tag and release name
        id: tag
        run: |
          tag="nightly-$(date -u +%Y-%m-%d)"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create or update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Nightly build ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*.zip
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
