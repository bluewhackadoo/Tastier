<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tastier Live Analysis</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b23; --panel2: #1d242f;
    --line: #2a3341; --text: #dfe6ef; --dim: #8b97a8;
    --up: #2dd4a7; --down: #ff5d73; --accent: #7aa5ff; --warn: #f5b94e;
    --mono: "SF Mono", "Cascadia Code", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { display: flex; align-items: baseline; gap: 14px;
           padding: 14px 22px; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; margin: 0; }
  .env { font: 11px var(--mono); padding: 2px 8px; border-radius: 4px;
         background: #23301f; color: var(--up); }
  .env.live { background: #35232a; color: var(--down); }
  .conn { margin-left: auto; font: 11px var(--mono); color: var(--dim); }
  .conn .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
               background: var(--down); margin-right: 6px; }
  .conn.on .dot { background: var(--up); }
  main { display: grid; grid-template-columns: 240px 1fr; gap: 0;
         height: calc(100vh - 49px); }
  #left { border-right: 1px solid var(--line); overflow-y: auto; }
  #right { overflow-y: auto; padding: 18px 22px; }
  /* thin dark scrollbars, ~20% smaller; autohide until the panel is hovered */
  * { scrollbar-width: thin; scrollbar-color: #2a3341 transparent; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a3341; border-radius: 5px;
                              border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: #3f4a5a; background-clip: content-box; }
  #left, #right { scrollbar-color: transparent transparent; transition: scrollbar-color .25s; }
  #left:hover, #right:hover { scrollbar-color: #2a3341 transparent; }
  #left::-webkit-scrollbar-thumb, #right::-webkit-scrollbar-thumb { background: transparent; }
  #left:hover::-webkit-scrollbar-thumb, #right:hover::-webkit-scrollbar-thumb {
    background: #2a3341; background-clip: content-box; }
  #left:hover::-webkit-scrollbar-thumb:hover,
  #right:hover::-webkit-scrollbar-thumb:hover { background: #3f4a5a; background-clip: content-box; }
  .group { border-bottom: 1px solid var(--line); cursor: pointer; padding: 10px 14px; }
  .group:hover { background: var(--panel); }
  .group.sel { background: var(--panel2); border-left: 3px solid var(--accent); }
  .group .u { font-weight: 600; font-size: 15px; }
  .ghead { display: flex; justify-content: space-between; align-items: center;
           margin-bottom: 6px; }
  .px { font: 600 12px var(--mono); padding: 2px 8px; border-radius: 3px;
        background: #414b5a; color: #fff; }
  .px.up { background: #1f6f4e; } .px.dn { background: #b23b4b; }
  .subexp { font: 10px var(--mono); color: var(--dim); letter-spacing: .08em;
            text-transform: uppercase; margin: 7px 0 3px; }
  .leg2 { display: grid; grid-template-columns: 30px 56px 34px 52px 20px;
          gap: 3px; padding: 2px 0; }
  .pill { display: block; background: #262c37; border-radius: 2px;
          padding: 1px 6px; font: 11px var(--mono); color: #cfd6e1;
          text-align: center; }
  .pill.dim { color: var(--dim); background: #1d232d; }
  .pill.pc { background: #333a47; }
  .pill.qty { text-align: right; }
  .pill.strike { text-align: right; }
  .pill.shares { grid-column: 2 / 6; text-align: left; }
  table.pos { width: 100%; border-collapse: collapse; margin-top: 14px;
              font: 12px var(--mono); }
  table.pos th { color: var(--dim); font-weight: 400; text-align: right;
                 padding: 4px 8px; border-bottom: 1px solid var(--line);
                 font-size: 11px; }
  table.pos td { text-align: right; padding: 3px 8px;
                 border-bottom: 1px solid #1a212b; }
  table.pos th:first-child, table.pos td:first-child { text-align: left;
                 white-space: nowrap; }
  table.pos tr.tot td { border-top: 1px solid var(--line); border-bottom: none;
                        font-weight: 600; }
  table.pos tr.grp td { background: #1a212c; font-weight: 600; color: #dfe6ef;
                        padding-top: 5px; }
  table.pos tr.grp { cursor: pointer; user-select: none; }
  table.pos tr.grp:hover td { background: #232d3c; }
  table.pos tr.off td { opacity: .38; }
  .vis { display: inline-block; width: 14px; color: var(--accent); }
  tr.off .vis { color: var(--dim); }
  .advisor { margin-top: 14px; background: var(--panel); border: 1px solid var(--line);
             border-radius: 8px; padding: 14px 16px; }
  .advisor .ahead { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .advisor .ahead h3 { margin: 0; font: 600 12px var(--mono); letter-spacing: .07em;
                       text-transform: uppercase; color: var(--dim); }
  .advisor .meta { margin-left: auto; font: 11px var(--mono); color: var(--dim); }
  .llmdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
  select.ahist, select.aprov { background: var(--panel2); color: var(--text); border: 1px solid var(--line);
                 border-radius: 5px; font: 11px var(--mono); padding: 4px 6px; }
  select.aprov option:disabled { color: var(--dim); opacity: .5; }
  button.abtn { background: #1f6f4e; color: #fff; border: 0; border-radius: 6px;
                padding: 6px 14px; cursor: pointer; font-size: 12px; font-weight: 600; }
  button.abtn:hover { background: #27865f; }
  button.abtn:disabled { opacity: .55; cursor: wait; }
  .aratings { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
              margin-top: 12px; }
  .arate { background: var(--panel2); border: 1px solid var(--line);
           border-radius: 8px; padding: 9px 12px 11px; text-align: center; }
  .arate .rk { font: 10px var(--mono); color: var(--dim); text-transform: uppercase;
               letter-spacing: .07em; }
  .arate .rv { font: 700 22px var(--mono); margin: 2px 0 1px; }
  .arate .rl { font-size: 11px; color: var(--dim); }
  .arate .bar { height: 4px; border-radius: 2px; background: #2a3341; margin-top: 7px; }
  .arate .bar i { display: block; height: 100%; border-radius: 2px; }
  .agrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .aquad { background: var(--panel2); border: 1px solid var(--line);
           border-radius: 8px; padding: 10px 14px; min-width: 0; }
  .aquad h4 { margin: 0 0 6px; font: 600 10px var(--mono); color: var(--dim);
              text-transform: uppercase; letter-spacing: .07em; }
  .aquad ul { margin: 0; padding-left: 16px; }
  .aquad li { font-size: 12.5px; line-height: 1.55; margin: 4px 0; color: #cfd6e1; }
  .aquad.warn { border-color: #5a4a1e; }
  .aquad.warn li { color: var(--warn); }
  .aquad p { margin: 0; font-size: 12.5px; line-height: 1.55; color: #cfd6e1; }
  .rec { display: flex; gap: 10px; align-items: flex-start; padding: 8px 10px;
         border: 1px solid var(--line); border-left: 3px solid var(--accent);
         border-radius: 6px; margin: 6px 0; background: var(--panel2); }
  .rec .rtag { font: 10px var(--mono); text-transform: uppercase; letter-spacing: .06em;
               white-space: nowrap; padding-top: 2px; min-width: 86px; }
  .rec .rbody b { font-size: 12.5px; }
  .rec .rbody div { font-size: 12px; color: #b9c2cf; margin-top: 2px; line-height: 1.45; }
  .rec .conf { margin-left: auto; font: 10px var(--mono); color: var(--dim);
               white-space: nowrap; padding-top: 2px; }
  .awarn { margin-top: 10px; font-size: 12px; color: var(--warn); }
  .adisc { margin-top: 10px; font-size: 10px; color: var(--dim); }
  .rollbadge { display: inline-block; margin-left: 7px; font: 9px var(--mono);
               font-weight: 400; color: var(--warn); background: #2b2413;
               border: 1px solid #5a4a1e; border-radius: 3px; padding: 0 5px;
               vertical-align: middle; letter-spacing: .02em; }
  .rsbbadge { display: inline-block; margin: 2px 0; font: 9px var(--mono);
              font-weight: 400; color: #c4b5fd; background: #2e2652;
              border: 1px solid #5b52a3; border-radius: 3px; padding: 0 5px;
              vertical-align: middle; letter-spacing: .02em; }
  table.pos tr.rsb-row td { padding: 2px 8px; background: transparent; border: none; }
  .num.pos { color: var(--up); } .num.neg { color: var(--down); }
  .syminfo { display: flex; align-items: center; gap: 10px; }
  .symlogo { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
             background: #fff; object-fit: contain; }
  .glogo { border-radius: 50%; flex-shrink: 0; background: #fff;
           object-fit: contain; vertical-align: middle; }
  .symname { font: 600 16px var(--mono); color: var(--text); letter-spacing: .02em; }
  .symdesc { font: 13px -apple-system, "Segoe UI", sans-serif; color: var(--dim);
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .rstack { display: flex; flex-direction: column; }
  .topbar { display: flex; gap: 0; align-items: stretch; overflow: hidden; }
  .topleft { flex: 0 0 40%; min-width: 0; display: flex; flex-direction: column; gap: 10px; padding: 0 14px 12px 0; overflow: hidden; }
  .sumgrid { display: flex; flex-wrap: wrap; align-content: start; gap: 8px 14px; }
  .scell { flex: 0 0 auto; min-width: 0; }
  .scell .k { font: 10px var(--mono); color: var(--dim); text-transform: uppercase;
              letter-spacing: .06em; padding-bottom: 2px;
              border-bottom: 1px solid var(--line); white-space: nowrap; }
  .scell .v { font: 600 13px var(--mono); padding-top: 3px; white-space: nowrap; }
  .candlebox { flex: 1 1 0; min-width: 0; position: relative;
               background: var(--panel); border: 1px solid var(--line);
               border-radius: 8px; overflow: hidden; cursor: grab; }
  .candlebox:active { cursor: grabbing; }
  .tvbox { flex: 1 1 0; min-width: 0; position: relative;
           background: var(--panel); border: 1px solid var(--line);
           border-radius: 8px; overflow: hidden; }
  .tvwatermark { position: absolute; inset: 0; display: flex; align-items: center;
                 justify-content: center; pointer-events: none; z-index: 2; }
  .tvwatermark span { font: 700 clamp(32px,8cqw,96px) var(--mono); color: #ffffff0d;
                      letter-spacing: .08em; text-transform: uppercase;
                      user-select: none; white-space: nowrap; }
  .tvbox .tradingview-widget-container { height: 100%; width: 100%; }
  .tvbox .tradingview-widget-container__widget { width: 100%; height: calc(100% + 34px); }
  .tvbox .tradingview-widget-container iframe { height: 100% !important; }
  .candlebox svg { display: block; width: 100%; height: 100%; }
  .cinfo { position: absolute; top: 6px; left: 10px; font: 11px var(--mono);
           color: var(--dim); }
  .cinfo b { color: var(--text); }
  .candle-empty { display: flex; align-items: center; justify-content: center;
                  height: 100%; color: var(--dim); font: 12px var(--mono); }
  .cax { position: absolute; font: 9px var(--mono); color: var(--dim);
         pointer-events: none; text-shadow: 0 0 3px #10151d, 0 0 3px #10151d; }
  .cax.y { right: 3px; transform: translateY(-50%); }
  .cax.x { transform: translateX(-50%); }
  .chair-tag { position: absolute; top: 2px; font: 10px var(--mono);
               background: #1d242f; border: 1px solid #3a4656; color: var(--text);
               padding: 0 4px; border-radius: 2px; pointer-events: none;
               white-space: nowrap; transform: translateX(-50%); }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
           gap: 10px; margin-bottom: 16px; }
  .card { background: var(--panel); border: 1px solid var(--line);
          border-radius: 8px; padding: 10px 14px; }
  .card .k { font-size: 11px; color: var(--dim); text-transform: uppercase;
             letter-spacing: .06em; }
  .card .v { font: 600 18px var(--mono); margin-top: 2px; }
  .v.pos { color: var(--up); } .v.neg { color: var(--down); }
  #chart { background: var(--panel); border: 1px solid var(--line);
           border-radius: 8px; padding: 12px; overflow: hidden; }
  .hdivider { height: 6px; cursor: row-resize; display: flex; align-items: center;
              justify-content: center; flex-shrink: 0; margin: 0; }
  .hdivider::after { content: ''; display: block; width: 40px; height: 2px;
                     border-radius: 1px; background: var(--line); transition: background .15s; }
  .hdivider:hover::after { background: var(--dim); }
  .vdivider { width: 6px; cursor: col-resize; display: flex; align-items: center;
              justify-content: center; flex-shrink: 0; }
  .vdivider::after { content: ''; display: block; width: 2px; height: 40px;
                     border-radius: 1px; background: var(--line); transition: background .15s; }
  .vdivider:hover::after { background: var(--dim); }
  .empty { color: var(--dim); padding: 60px; text-align: center; }
  .stale { color: var(--warn); font: 11px var(--mono); margin-left: 8px; }
  .acct { color: var(--dim); font: 12px var(--mono); cursor: default;
          letter-spacing: .04em; }
  .acct .acct-mask { display: inline; }
  .acct .acct-full { display: none; }
  .acct:hover .acct-mask { display: none; }
  .acct:hover .acct-full { display: inline; }
  button.reload { background: none; border: 1px solid var(--line); color: var(--dim);
           border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
  button.reload:hover { color: var(--text); border-color: var(--dim); }
  .setupbox { max-width: 560px; margin: 60px auto; background: var(--panel);
              border: 1px solid var(--line); border-radius: 10px; padding: 26px; }
  .setupbox code { background: var(--panel2); padding: 2px 6px; border-radius: 4px;
                   font: 12px var(--mono); }
  .prob { color: var(--down); font: 12px var(--mono); margin: 4px 0; }
  .setupform { display: grid; gap: 8px; margin: 16px 0; }
  .setupform label { font: 11px var(--mono); color: var(--dim); text-transform: uppercase; }
  .setupform input, .setupform select {
    background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 8px 10px; font: 13px var(--mono); }
  .setupform button {
    margin-top: 6px; background: var(--up); color: #05140e; border: none;
    border-radius: 6px; padding: 10px; font: 600 13px var(--sans); cursor: pointer; }
  .setupform button:disabled { opacity: .6; cursor: wait; }
  .setuphint { margin-top: 14px; color: var(--dim); font-size: 13px; }
  .setuphint ol { padding-left: 18px; line-height: 1.6; }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script crossorigin src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
<script type="module" src="/js/main.js"></script>
</body>
</html>
