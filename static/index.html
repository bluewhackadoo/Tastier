<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tasty Live Analysis</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b23; --panel2: #1d242f;
    --line: #2a3341; --text: #dfe6ef; --dim: #8b97a8;
    --up: #2dd4a7; --down: #ff5d73; --accent: #7aa5ff; --warn: #f5b94e;
    --mono: "SF Mono", "Cascadia Code", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { display: flex; align-items: baseline; gap: 14px;
           padding: 14px 22px; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; margin: 0; }
  .env { font: 11px var(--mono); padding: 2px 8px; border-radius: 4px;
         background: #23301f; color: var(--up); }
  .env.live { background: #35232a; color: var(--down); }
  .conn { margin-left: auto; font: 11px var(--mono); color: var(--dim); }
  .conn .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
               background: var(--down); margin-right: 6px; }
  .conn.on .dot { background: var(--up); }
  main { display: grid; grid-template-columns: 320px 1fr; gap: 0;
         height: calc(100vh - 49px); }
  #left { border-right: 1px solid var(--line); overflow-y: auto; }
  #right { overflow-y: auto; padding: 18px 22px; }
  .group { border-bottom: 1px solid var(--line); cursor: pointer; padding: 12px 16px; }
  .group:hover { background: var(--panel); }
  .group.sel { background: var(--panel2); border-left: 3px solid var(--accent); }
  .group .u { font-weight: 600; font-size: 15px; }
  .group .spot { font: 12px var(--mono); color: var(--dim); float: right; }
  .leg { display: flex; justify-content: space-between; font: 12px var(--mono);
         color: var(--dim); padding: 1px 0; }
  .leg .q.long { color: var(--up); } .leg .q.short { color: var(--down); }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
           gap: 10px; margin-bottom: 16px; }
  .card { background: var(--panel); border: 1px solid var(--line);
          border-radius: 8px; padding: 10px 14px; }
  .card .k { font-size: 11px; color: var(--dim); text-transform: uppercase;
             letter-spacing: .06em; }
  .card .v { font: 600 18px var(--mono); margin-top: 2px; }
  .v.pos { color: var(--up); } .v.neg { color: var(--down); }
  #chart { background: var(--panel); border: 1px solid var(--line);
           border-radius: 8px; padding: 12px; }
  .empty { color: var(--dim); padding: 60px; text-align: center; }
  .stale { color: var(--warn); font: 11px var(--mono); margin-left: 8px; }
  button.reload { background: none; border: 1px solid var(--line); color: var(--dim);
           border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
  button.reload:hover { color: var(--text); border-color: var(--dim); }
  .setupbox { max-width: 560px; margin: 60px auto; background: var(--panel);
              border: 1px solid var(--line); border-radius: 10px; padding: 26px; }
  .setupbox code { background: var(--panel2); padding: 2px 6px; border-radius: 4px;
                   font: 12px var(--mono); }
  .prob { color: var(--down); font: 12px var(--mono); margin: 4px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script crossorigin src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
<script>
const { useState, useEffect, useRef, useMemo, createElement } = React;
const html = htm.bind(createElement);
const { ResponsiveContainer, ComposedChart, Line, Area, XAxis, YAxis,
        CartesianGrid, ReferenceLine, Tooltip } = Recharts;

const fmt = (v, d=2) => v == null ? "—" :
  v.toLocaleString("en-US", {minimumFractionDigits:d, maximumFractionDigits:d});
const money = v => (v < 0 ? "-$" : "$") + fmt(Math.abs(v));

function App() {
  const [setup, setSetup] = useState(null);       // /api/setup/validate result
  const [account, setAccount] = useState(null);
  const [groups, setGroups] = useState({});
  const [sel, setSel] = useState(null);
  const [ana, setAna] = useState(null);
  const [quotes, setQuotes] = useState({});
  const [wsOn, setWsOn] = useState(false);
  const anaTimer = useRef(null);

  useEffect(() => {
    fetch("/api/setup/validate").then(r => r.json()).then(s => {
      setSetup(s);
      if (s.ok && s.accounts.length) setAccount(s.accounts[0].account_number);
    });
  }, []);

  useEffect(() => {
    if (!account) return;
    fetch(`/api/positions/${account}`).then(r => r.json())
      .then(d => {
        setGroups(d.groups);
        const keys = Object.keys(d.groups);
        if (keys.length && !sel) setSel(keys[0]);
      });
  }, [account]);

  // websocket quotes
  useEffect(() => {
    if (!account) return;
    let ws, alive = true, ping;
    const connect = () => {
      ws = new WebSocket(`ws://${location.host}/ws/quotes`);
      ws.onopen = () => { setWsOn(true);
        ping = setInterval(() => ws.readyState === 1 && ws.send("ping"), 15000); };
      ws.onmessage = e => {
        const m = JSON.parse(e.data);
        if (m.symbol) setQuotes(q => ({...q, [m.symbol]: {...q[m.symbol], ...m}}));
      };
      ws.onclose = () => { setWsOn(false); clearInterval(ping);
        if (alive) setTimeout(connect, 1500); };
    };
    connect();
    return () => { alive = false; ws && ws.close(); clearInterval(ping); };
  }, [account]);

  // refresh analysis when selection changes + every 3s (T+0 line uses live IV/spot)
  useEffect(() => {
    if (!account || !sel) return;
    const load = () => fetch(`/api/analysis/${account}/${sel}`)
      .then(r => r.ok ? r.json() : null).then(d => d && setAna(d));
    load();
    anaTimer.current = setInterval(load, 3000);
    return () => clearInterval(anaTimer.current);
  }, [account, sel]);

  if (!setup) return html`<div class="empty">Checking setup…</div>`;
  if (!setup.ok) return html`<${SetupHelp} setup=${setup} />`;

  const spotQ = quotes[sel] || {};
  const stale = spotQ.ts && (Date.now()/1000 - spotQ.ts) > 10;

  return html`
    <header>
      <h1>TASTY LIVE ANALYSIS</h1>
      <span class="env ${setup.env==='live'?'live':''}">${setup.env.toUpperCase()}</span>
      <span style=${{color:'var(--dim)',fontSize:'12px'}}>acct ${account}</span>
      <span class="conn ${wsOn?'on':''}"><span class="dot"></span>${wsOn?'stream live':'stream down'}</span>
    </header>
    <main>
      <div id="left">
        ${Object.entries(groups).map(([u, legs]) => html`
          <div key=${u} class="group ${sel===u?'sel':''}" onClick=${()=>setSel(u)}>
            <span class="spot">${fmt(quotes[u]?.mid)}</span>
            <div class="u">${u}</div>
            ${legs.map(l => html`
              <div key=${l.symbol} class="leg">
                <span class="q ${l.qty>0?'long':'short'}">${l.qty>0?'+':''}${l.qty}</span>
                <span>${l.strike ? `${fmt(l.strike,0)}${l.option_type} ${l.expiration}` : 'shares'}</span>
                <span>${fmt(quotes[l.streamer_symbol]?.mid ?? l.mark_price)}</span>
              </div>`)}
          </div>`)}
        ${!Object.keys(groups).length && html`<div class="empty">No open positions</div>`}
      </div>
      <div id="right">
        ${ana ? html`<${Analysis} ana=${ana} stale=${stale} />`
              : html`<div class="empty">Select a position</div>`}
      </div>
    </main>`;
}

function Analysis({ ana, stale }) {
  const data = useMemo(() => ana.grid.map((s, i) => ({
    spot: s, exp: ana.expiration_pl[i], t0: ana.t0_pl[i],
  })), [ana]);
  return html`
    <div>
      <div class="cards">
        <div class="card"><div class="k">Live P/L</div>
          <div class="v ${ana.live_pl>=0?'pos':'neg'}">${money(ana.live_pl)}</div></div>
        <div class="card"><div class="k">Spot ${stale?html`<span class="stale">stale</span>`:''}</div>
          <div class="v">${fmt(ana.spot)}</div></div>
        <div class="card"><div class="k">Max profit</div>
          <div class="v pos">${money(ana.max_profit)}</div></div>
        <div class="card"><div class="k">Max loss</div>
          <div class="v neg">${money(ana.max_loss)}</div></div>
        <div class="card"><div class="k">Breakevens</div>
          <div class="v" style=${{fontSize:'14px'}}>${ana.breakevens.map(b=>fmt(b)).join(" / ")||"—"}</div></div>
      </div>
      <div id="chart">
        <${ResponsiveContainer} width="100%" height=${420}>
          <${ComposedChart} data=${data} margin=${{top:10,right:20,bottom:5,left:10}}>
            <${CartesianGrid} stroke="#2a3341" strokeDasharray="3 3" />
            <${XAxis} dataKey="spot" tickFormatter=${v=>fmt(v,0)} stroke="#8b97a8"
                      type="number" domain=${["dataMin","dataMax"]} tickCount=${9} />
            <${YAxis} tickFormatter=${v=>fmt(v,0)} stroke="#8b97a8" width=${70} />
            <${Tooltip} contentStyle=${{background:"#1d242f",border:"1px solid #2a3341"}}
              formatter=${(v,n)=>[money(v), n==="exp"?"At expiration":"T+0 (now)"]}
              labelFormatter=${v=>"Spot "+fmt(v)} />
            <${ReferenceLine} y=${0} stroke="#8b97a8" />
            <${ReferenceLine} x=${ana.spot} stroke="#7aa5ff" strokeWidth=${1.5}
              label=${{value:"spot", fill:"#7aa5ff", fontSize:11, position:"top"}} />
            ${ana.breakevens.map(b => html`
              <${ReferenceLine} key=${b} x=${b} stroke="#f5b94e" strokeDasharray="4 4" />`)}
            <${Line} type="monotone" dataKey="exp" stroke="#dfe6ef" dot=${false}
                     strokeWidth=${2} isAnimationActive=${false} name="exp" />
            <${Line} type="monotone" dataKey="t0" stroke="#2dd4a7" dot=${false}
                     strokeWidth=${2} strokeDasharray="6 3" isAnimationActive=${false} name="t0" />
          <//>
        <//>
      </div>
    </div>`;
}

function SetupHelp({ setup }) {
  return html`
    <div class="setupbox">
      <h2 style=${{marginTop:0}}>Setup needed (stage: ${setup.stage})</h2>
      ${setup.problems.map(p => html`<div key=${p} class="prob">✗ ${p}</div>`)}
      <ol style=${{color:'var(--dim)'}}>
        <li>Copy <code>.env.example</code> to <code>.env</code></li>
        <li>Create a read-only OAuth grant at my.tastytrade.com → API</li>
        <li>Paste <code>TT_SECRET</code> and <code>TT_REFRESH</code> into <code>.env</code></li>
        <li>Run <code>chmod 600 .env</code>, then <code>make check</code></li>
      </ol>
      <button class="reload" onClick=${()=>location.reload()}>Re-check</button>
    </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
