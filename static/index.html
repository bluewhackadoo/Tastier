<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tastier Live Analysis</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b23; --panel2: #1d242f;
    --line: #2a3341; --text: #dfe6ef; --dim: #8b97a8;
    --up: #2dd4a7; --down: #ff5d73; --accent: #7aa5ff; --warn: #f5b94e;
    --mono: "SF Mono", "Cascadia Code", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif; }
  header { display: flex; align-items: baseline; gap: 14px;
           padding: 14px 22px; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; margin: 0; }
  .env { font: 11px var(--mono); padding: 2px 8px; border-radius: 4px;
         background: #23301f; color: var(--up); }
  .env.live { background: #35232a; color: var(--down); }
  .conn { margin-left: auto; font: 11px var(--mono); color: var(--dim); }
  .conn .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
               background: var(--down); margin-right: 6px; }
  .conn.on .dot { background: var(--up); }
  main { display: grid; grid-template-columns: 240px 1fr; gap: 0;
         height: calc(100vh - 49px); }
  #left { border-right: 1px solid var(--line); overflow-y: auto; }
  #right { overflow-y: auto; padding: 18px 22px; }
  /* thin dark scrollbars, ~20% smaller; autohide until the panel is hovered */
  * { scrollbar-width: thin; scrollbar-color: #2a3341 transparent; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a3341; border-radius: 5px;
                              border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: #3f4a5a; background-clip: content-box; }
  #left, #right { scrollbar-color: transparent transparent; transition: scrollbar-color .25s; }
  #left:hover, #right:hover { scrollbar-color: #2a3341 transparent; }
  #left::-webkit-scrollbar-thumb, #right::-webkit-scrollbar-thumb { background: transparent; }
  #left:hover::-webkit-scrollbar-thumb, #right:hover::-webkit-scrollbar-thumb {
    background: #2a3341; background-clip: content-box; }
  #left:hover::-webkit-scrollbar-thumb:hover,
  #right:hover::-webkit-scrollbar-thumb:hover { background: #3f4a5a; background-clip: content-box; }
  .group { border-bottom: 1px solid var(--line); cursor: pointer; padding: 10px 14px; }
  .group:hover { background: var(--panel); }
  .group.sel { background: var(--panel2); border-left: 3px solid var(--accent); }
  .group .u { font-weight: 600; font-size: 15px; }
  .ghead { display: flex; justify-content: space-between; align-items: center;
           margin-bottom: 6px; }
  .px { font: 600 12px var(--mono); padding: 2px 8px; border-radius: 3px;
        background: #414b5a; color: #fff; }
  .px.up { background: #1f6f4e; } .px.dn { background: #b23b4b; }
  .subexp { font: 10px var(--mono); color: var(--dim); letter-spacing: .08em;
            text-transform: uppercase; margin: 7px 0 3px; }
  .leg2 { display: grid; grid-template-columns: 30px 56px 34px 52px 20px;
          gap: 3px; padding: 2px 0; }
  .pill { display: block; background: #262c37; border-radius: 2px;
          padding: 1px 6px; font: 11px var(--mono); color: #cfd6e1;
          text-align: center; }
  .pill.dim { color: var(--dim); background: #1d232d; }
  .pill.pc { background: #333a47; }
  .pill.qty { text-align: right; }
  .pill.strike { text-align: right; }
  .pill.shares { grid-column: 2 / 6; text-align: left; }
  table.pos { width: 100%; border-collapse: collapse; margin-top: 14px;
              font: 12px var(--mono); }
  table.pos th { color: var(--dim); font-weight: 400; text-align: right;
                 padding: 4px 8px; border-bottom: 1px solid var(--line);
                 font-size: 11px; }
  table.pos td { text-align: right; padding: 3px 8px;
                 border-bottom: 1px solid #1a212b; }
  table.pos th:first-child, table.pos td:first-child { text-align: left;
                 white-space: nowrap; }
  table.pos tr.tot td { border-top: 1px solid var(--line); border-bottom: none;
                        font-weight: 600; }
  table.pos tr.grp td { background: #1a212c; font-weight: 600; color: #dfe6ef;
                        padding-top: 5px; }
  table.pos tr.grp { cursor: pointer; user-select: none; }
  table.pos tr.grp:hover td { background: #232d3c; }
  table.pos tr.off td { opacity: .38; }
  .vis { display: inline-block; width: 14px; color: var(--accent); }
  tr.off .vis { color: var(--dim); }
  .advisor { margin-top: 14px; background: var(--panel); border: 1px solid var(--line);
             border-radius: 8px; padding: 14px 16px; }
  .advisor .ahead { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .advisor .ahead h3 { margin: 0; font: 600 12px var(--mono); letter-spacing: .07em;
                       text-transform: uppercase; color: var(--dim); }
  .advisor .meta { margin-left: auto; font: 11px var(--mono); color: var(--dim); }
  .llmdot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
  select.ahist, select.aprov { background: var(--panel2); color: var(--text); border: 1px solid var(--line);
                 border-radius: 5px; font: 11px var(--mono); padding: 4px 6px; }
  select.aprov option:disabled { color: var(--dim); opacity: .5; }
  button.abtn { background: #1f6f4e; color: #fff; border: 0; border-radius: 6px;
                padding: 6px 14px; cursor: pointer; font-size: 12px; font-weight: 600; }
  button.abtn:hover { background: #27865f; }
  button.abtn:disabled { opacity: .55; cursor: wait; }
  .aratings { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
              margin-top: 12px; }
  .arate { background: var(--panel2); border: 1px solid var(--line);
           border-radius: 8px; padding: 9px 12px 11px; text-align: center; }
  .arate .rk { font: 10px var(--mono); color: var(--dim); text-transform: uppercase;
               letter-spacing: .07em; }
  .arate .rv { font: 700 22px var(--mono); margin: 2px 0 1px; }
  .arate .rl { font-size: 11px; color: var(--dim); }
  .arate .bar { height: 4px; border-radius: 2px; background: #2a3341; margin-top: 7px; }
  .arate .bar i { display: block; height: 100%; border-radius: 2px; }
  .agrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
  .aquad { background: var(--panel2); border: 1px solid var(--line);
           border-radius: 8px; padding: 10px 14px; min-width: 0; }
  .aquad h4 { margin: 0 0 6px; font: 600 10px var(--mono); color: var(--dim);
              text-transform: uppercase; letter-spacing: .07em; }
  .aquad ul { margin: 0; padding-left: 16px; }
  .aquad li { font-size: 12.5px; line-height: 1.55; margin: 4px 0; color: #cfd6e1; }
  .aquad.warn { border-color: #5a4a1e; }
  .aquad.warn li { color: var(--warn); }
  .aquad p { margin: 0; font-size: 12.5px; line-height: 1.55; color: #cfd6e1; }
  .rec { display: flex; gap: 10px; align-items: flex-start; padding: 8px 10px;
         border: 1px solid var(--line); border-left: 3px solid var(--accent);
         border-radius: 6px; margin: 6px 0; background: var(--panel2); }
  .rec .rtag { font: 10px var(--mono); text-transform: uppercase; letter-spacing: .06em;
               white-space: nowrap; padding-top: 2px; min-width: 86px; }
  .rec .rbody b { font-size: 12.5px; }
  .rec .rbody div { font-size: 12px; color: #b9c2cf; margin-top: 2px; line-height: 1.45; }
  .rec .conf { margin-left: auto; font: 10px var(--mono); color: var(--dim);
               white-space: nowrap; padding-top: 2px; }
  .awarn { margin-top: 10px; font-size: 12px; color: var(--warn); }
  .adisc { margin-top: 10px; font-size: 10px; color: var(--dim); }
  .rollbadge { display: inline-block; margin-left: 7px; font: 9px var(--mono);
               font-weight: 400; color: var(--warn); background: #2b2413;
               border: 1px solid #5a4a1e; border-radius: 3px; padding: 0 5px;
               vertical-align: middle; letter-spacing: .02em; }
  .rsbbadge { display: inline-block; margin: 2px 0; font: 9px var(--mono);
              font-weight: 400; color: #c4b5fd; background: #2e2652;
              border: 1px solid #5b52a3; border-radius: 3px; padding: 0 5px;
              vertical-align: middle; letter-spacing: .02em; }
  table.pos tr.rsb-row td { padding: 2px 8px; background: transparent; border: none; }
  .num.pos { color: var(--up); } .num.neg { color: var(--down); }
  .syminfo { display: flex; align-items: center; gap: 10px; }
  .symlogo { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
             background: #fff; object-fit: contain; }
  .glogo { border-radius: 50%; flex-shrink: 0; background: #fff;
           object-fit: contain; vertical-align: middle; }
  .symname { font: 600 16px var(--mono); color: var(--text); letter-spacing: .02em; }
  .symdesc { font: 13px -apple-system, "Segoe UI", sans-serif; color: var(--dim);
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .rstack { display: flex; flex-direction: column; }
  .topbar { display: flex; gap: 0; align-items: stretch; overflow: hidden; }
  .topleft { flex: 0 0 40%; min-width: 0; display: flex; flex-direction: column; gap: 10px; padding: 0 14px 12px 0; overflow: hidden; }
  .sumgrid { display: flex; flex-wrap: wrap; align-content: start; gap: 8px 14px; }
  .scell { flex: 0 0 auto; min-width: 0; }
  .scell .k { font: 10px var(--mono); color: var(--dim); text-transform: uppercase;
              letter-spacing: .06em; padding-bottom: 2px;
              border-bottom: 1px solid var(--line); white-space: nowrap; }
  .scell .v { font: 600 13px var(--mono); padding-top: 3px; white-space: nowrap; }
  .candlebox { flex: 1 1 0; min-width: 0; position: relative;
               background: var(--panel); border: 1px solid var(--line);
               border-radius: 8px; overflow: hidden; cursor: grab; }
  .candlebox:active { cursor: grabbing; }
  .tvbox { flex: 1 1 0; min-width: 0; position: relative;
           background: var(--panel); border: 1px solid var(--line);
           border-radius: 8px; overflow: hidden; }
  .tvwatermark { position: absolute; inset: 0; display: flex; align-items: center;
                 justify-content: center; pointer-events: none; z-index: 2; }
  .tvwatermark span { font: 700 clamp(32px,8cqw,96px) var(--mono); color: #ffffff0d;
                      letter-spacing: .08em; text-transform: uppercase;
                      user-select: none; white-space: nowrap; }
  .tvbox .tradingview-widget-container { height: 100%; width: 100%; }
  .tvbox .tradingview-widget-container__widget { width: 100%; height: calc(100% + 34px); }
  .tvbox .tradingview-widget-container iframe { height: 100% !important; }
  .candlebox svg { display: block; width: 100%; height: 100%; }
  .cinfo { position: absolute; top: 6px; left: 10px; font: 11px var(--mono);
           color: var(--dim); }
  .cinfo b { color: var(--text); }
  .candle-empty { display: flex; align-items: center; justify-content: center;
                  height: 100%; color: var(--dim); font: 12px var(--mono); }
  .cax { position: absolute; font: 9px var(--mono); color: var(--dim);
         pointer-events: none; text-shadow: 0 0 3px #10151d, 0 0 3px #10151d; }
  .cax.y { right: 3px; transform: translateY(-50%); }
  .cax.x { transform: translateX(-50%); }
  .chair-tag { position: absolute; top: 2px; font: 10px var(--mono);
               background: #1d242f; border: 1px solid #3a4656; color: var(--text);
               padding: 0 4px; border-radius: 2px; pointer-events: none;
               white-space: nowrap; transform: translateX(-50%); }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
           gap: 10px; margin-bottom: 16px; }
  .card { background: var(--panel); border: 1px solid var(--line);
          border-radius: 8px; padding: 10px 14px; }
  .card .k { font-size: 11px; color: var(--dim); text-transform: uppercase;
             letter-spacing: .06em; }
  .card .v { font: 600 18px var(--mono); margin-top: 2px; }
  .v.pos { color: var(--up); } .v.neg { color: var(--down); }
  #chart { background: var(--panel); border: 1px solid var(--line);
           border-radius: 8px; padding: 12px; overflow: hidden; }
  .hdivider { height: 6px; cursor: row-resize; display: flex; align-items: center;
              justify-content: center; flex-shrink: 0; margin: 0; }
  .hdivider::after { content: ''; display: block; width: 40px; height: 2px;
                     border-radius: 1px; background: var(--line); transition: background .15s; }
  .hdivider:hover::after { background: var(--dim); }
  .vdivider { width: 6px; cursor: col-resize; display: flex; align-items: center;
              justify-content: center; flex-shrink: 0; }
  .vdivider::after { content: ''; display: block; width: 2px; height: 40px;
                     border-radius: 1px; background: var(--line); transition: background .15s; }
  .vdivider:hover::after { background: var(--dim); }
  .empty { color: var(--dim); padding: 60px; text-align: center; }
  .stale { color: var(--warn); font: 11px var(--mono); margin-left: 8px; }
  .acct { color: var(--dim); font: 12px var(--mono); cursor: default;
          letter-spacing: .04em; }
  .acct .acct-mask { display: inline; }
  .acct .acct-full { display: none; }
  .acct:hover .acct-mask { display: none; }
  .acct:hover .acct-full { display: inline; }
  button.reload { background: none; border: 1px solid var(--line); color: var(--dim);
           border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
  button.reload:hover { color: var(--text); border-color: var(--dim); }
  .setupbox { max-width: 560px; margin: 60px auto; background: var(--panel);
              border: 1px solid var(--line); border-radius: 10px; padding: 26px; }
  .setupbox code { background: var(--panel2); padding: 2px 6px; border-radius: 4px;
                   font: 12px var(--mono); }
  .prob { color: var(--down); font: 12px var(--mono); margin: 4px 0; }
  .setupform { display: grid; gap: 8px; margin: 16px 0; }
  .setupform label { font: 11px var(--mono); color: var(--dim); text-transform: uppercase; }
  .setupform input, .setupform select {
    background: var(--bg); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 8px 10px; font: 13px var(--mono); }
  .setupform button {
    margin-top: 6px; background: var(--up); color: #05140e; border: none;
    border-radius: 6px; padding: 10px; font: 600 13px var(--sans); cursor: pointer; }
  .setupform button:disabled { opacity: .6; cursor: wait; }
  .setuphint { margin-top: 14px; color: var(--dim); font-size: 13px; }
  .setuphint ol { padding-left: 18px; line-height: 1.6; }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script crossorigin src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
<script>
const { useState, useEffect, useRef, useMemo, useCallback, createElement } = React;
const html = htm.bind(createElement);
const { ResponsiveContainer, ComposedChart, Line, Area, XAxis, YAxis,
        CartesianGrid, ReferenceLine, Tooltip, Customized } = Recharts;

// Anchor every URL to the real origin. In some embedding contexts (e.g. an
// about:srcdoc iframe) document.baseURI can't resolve a relative "/api/..."
// path, so fetch() throws "Failed to parse URL"; an absolute origin avoids it.
const ORIGIN = (location.origin && location.origin !== "null") ? location.origin : "";
const api = p => ORIGIN + p;
const wsUrl = p => (ORIGIN ? ORIGIN.replace(/^http/, "ws") : `ws://${location.host}`) + p;

const fmt = (v, d=2) => v == null ? "—" :
  v.toLocaleString("en-US", {minimumFractionDigits:d, maximumFractionDigits:d});
const money = v => (v < 0 ? "-$" : "$") + fmt(Math.abs(v)).replace(/\.00$/, "");
const fmtK = v => {
  const av = Math.abs(v);
  if (av >= 1000) return ((v/1000).toFixed(2) + "K").replace(/\.00K$/, "K");
  if (av >= 1) return String(Math.round(v));
  return fmt(v, 2);
};
const signColor = v => v >= 0 ? "#2dd4a7" : "#ff5d73";

// linear interpolation of ys over sorted xs
const interp = (xs, ys, x) => {
  if (x <= xs[0]) return ys[0];
  if (x >= xs[xs.length-1]) return ys[ys.length-1];
  let lo = 0, hi = xs.length - 1;
  while (hi - lo > 1) { const m = (lo + hi) >> 1; xs[m] <= x ? lo = m : hi = m; }
  const f = (x - xs[lo]) / (xs[hi] - xs[lo]);
  return ys[lo] + f * (ys[hi] - ys[lo]);
};

const niceStep = raw => {
  const p = Math.pow(10, Math.floor(Math.log10(raw)));
  for (const m of [1, 2, 2.5, 5, 10]) if (m * p >= raw) return m * p;
  return 10 * p;
};

// green shades for each earlier-dated position's expiration shape (nearest
// first), nested over the terminal combined shape; profit region is filled,
// losses read through the terminal's red — so DTE shapes stay "all green"
const DTE_SHADES = [
  { fill: "#4fb488", line: "#8fe8c0" },
  { fill: "#7bbf4a", line: "#c4e89a" },
  { fill: "#3f9db4", line: "#8fd8e6" },
  { fill: "#b0a63f", line: "#e6dc9a" },
];

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const mmmdd = iso => {
  if (!iso) return "";
  const [, m, d] = iso.split("-");
  return `${MONTHS[+m - 1]} ${+d}`;
};
const strk = v => v == null ? "" : String(+v);
const dteDays = l => l.dte_days ?? Math.round(l.dte_years * 365);

// Generic drag-to-resize hook. axis='y' → row-resize, axis='x' → col-resize.
// onDelta receives the raw px delta each mousemove; caller owns the state.
function useDividerDrag(axis, onDelta) {
  const start = useRef(null);
  const onMouseDown = e => {
    e.preventDefault();
    start.current = axis === 'y' ? e.clientY : e.clientX;
    const onMove = ev => {
      const pos = axis === 'y' ? ev.clientY : ev.clientX;
      onDelta(pos - start.current);
      start.current = pos;
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };
  return onMouseDown;
}

// Logo component — tracks 404/error in React state so switching symbols
// never leaves a stale display:none on the DOM node
function TickerLogo({ sym, size = 22, className = "symlogo" }) {
  const [err, setErr] = useState(false);
  useEffect(() => setErr(false), [sym]);
  if (!sym || err) return null;
  return html`<img class=${className} alt=""
    src=${api(`/api/logo/${encodeURIComponent(sym)}`)}
    style=${{width: size + "px", height: size + "px"}}
    onError=${() => setErr(true)} />`;
}

// leg pill row shared by the left panel and the position table;
// fixed grid columns keep every row vertically aligned
const LegPills = ({ l }) => l.strike == null
  ? html`<div class="leg2">
      <span class="pill qty">${l.qty}</span>
      <span class="pill shares">${l.symbol?.includes("/") ? "futures" : "shares"}</span>
    </div>`
  : html`<div class="leg2">
      <span class="pill qty">${l.qty}</span>
      <span class="pill">${mmmdd(l.expiration)}</span>
      <span class="pill dim">${dteDays(l)}d</span>
      <span class="pill strike">${strk(l.strike)}</span>
      <span class="pill pc">${l.option_type}</span>
    </div>`;

// name the strategy for one expiration's legs (sorted by strike)
function isCondorShape(ls) {
  if (ls.length !== 4) return false;
  const strikes = [...new Set(ls.map(l => l.strike))];
  if (strikes.length !== 4) return false;
  const puts = ls.filter(l => l.option_type === "P");
  const calls = ls.filter(l => l.option_type === "C");
  const sameAbs = ls.every(l => Math.abs(l.qty) === Math.abs(ls[0].qty));
  if (!sameAbs) return false;
  if (puts.length === 2 && calls.length === 2) {
    const [pLo, pHi] = puts.sort((a, b) => a.strike - b.strike);
    const [cLo, cHi] = calls.sort((a, b) => a.strike - b.strike);
    if (pLo.qty > 0 && pHi.qty < 0 && cLo.qty < 0 && cHi.qty > 0) return true;
    if (pLo.qty < 0 && pHi.qty > 0 && cLo.qty > 0 && cHi.qty < 0) return true;
  }
  if (puts.length === 4 || calls.length === 4) {
    const sorted = ls.sort((a, b) => a.strike - b.strike);
    const signs = sorted.map(l => Math.sign(l.qty));
    if (signs[0] === 1 && signs[1] === -1 && signs[2] === -1 && signs[3] === 1) return true;
    if (signs[0] === -1 && signs[1] === 1 && signs[2] === 1 && signs[3] === -1) return true;
  }
  return false;
}

function classify(ls) {
  const puts = ls.filter(l => l.option_type === "P");
  const calls = ls.filter(l => l.option_type === "C");
  const sameAbs = ls.every(l => Math.abs(l.qty) === Math.abs(ls[0].qty));
  if (ls.length === 4 && puts.length === 2 && calls.length === 2 && sameAbs) {
    const [pLo, pHi] = puts, [cLo, cHi] = calls;
    if (pLo.qty > 0 && pHi.qty < 0 && cLo.qty < 0 && cHi.qty > 0)
      return pHi.strike === cLo.strike ? "Iron Butterfly" : "Iron Condor";
    if (pLo.qty < 0 && pHi.qty > 0 && cLo.qty > 0 && cHi.qty < 0)
      return "Reverse Iron Condor";
  }
  if (ls.length === 4 && sameAbs && (puts.length === 4 || calls.length === 4)
      && isCondorShape(ls)) {
    const kind = puts.length === 4 ? "Put" : "Call";
    const sorted = ls.sort((a, b) => a.strike - b.strike);
    const signs = sorted.map(l => Math.sign(l.qty));
    return signs[0] === 1 && signs[1] === -1 && signs[2] === -1 && signs[3] === 1
      ? `${kind} Condor` : `Reverse ${kind} Condor`;
  }
  if (ls.length === 3 && (puts.length === 3 || calls.length === 3)) {
    const [a, b, c] = ls;
    if (a.qty === c.qty && b.qty === -2 * a.qty)
      return (a.qty > 0 ? "" : "Reverse ") + "Butterfly";
  }
  if (ls.length === 2 && puts.length === 1 && calls.length === 1
      && Math.sign(puts[0].qty) === Math.sign(calls[0].qty)) {
    const kind = puts[0].strike === calls[0].strike ? "Straddle" : "Strangle";
    return (puts[0].qty < 0 ? "Short " : "") + kind;
  }
  if (ls.length === 2 && (puts.length === 2 || calls.length === 2)
      && ls[0].qty === -ls[1].qty)
    return "Vertical";
  if (ls.length === 1)
    return (ls[0].qty < 0 ? "Short " : "") + (ls[0].option_type === "C" ? "Call" : "Put");
  return "Custom";
}

// pair long/short legs of one option type into verticals (by strike order);
// returns null unless the legs split cleanly into matching pairs
function extractVerticals(legs) {
  const longs = legs.filter(l => l.qty > 0), shorts = legs.filter(l => l.qty < 0);
  if (!longs.length || longs.length !== shorts.length) return null;
  if (!longs.every((l, i) => Math.abs(l.qty) === Math.abs(shorts[i].qty))) return null;
  return longs.map((l, i) => [l, shorts[i]]);
}

// a same-expiry cluster that classifies as Custom may really be several
// stacked strategies (e.g. two iron condors opened separately); split it
// into verticals and pair put+call verticals into condors
function decompose(ls) {
  if (ls.length < 4 || classify(ls) !== "Custom") return [ls];
  const pv = extractVerticals(ls.filter(l => l.option_type === "P"));
  const cv = extractVerticals(ls.filter(l => l.option_type === "C"));
  const byStrike = sub => sub.sort((a, b) =>
    a.strike - b.strike || (a.option_type === "P" ? -1 : 1));
  const puts = ls.filter(l => l.option_type === "P");
  const calls = ls.filter(l => l.option_type === "C");
  if (pv && cv && pv.length === cv.length)
    return pv.map((v, i) => byStrike([...v, ...cv[i]]));
  if (pv && !calls.length) return pv.map(byStrike);   // stacked put verticals
  if (cv && !puts.length) return cv.map(byStrike);    // stacked call verticals
  return [ls];
}

// Two separate order chains may each look like a vertical, but together form a
// condor (e.g. put condor opened as two put spreads). Merge those groups.
function mergeCondorGroups(groups) {
  const merged = [];
  const used = new Set();
  for (let i = 0; i < groups.length; i++) {
    if (used.has(i)) continue;
    const g1 = groups[i];
    let partnerIdx = -1;
    for (let j = i + 1; j < groups.length; j++) {
      if (used.has(j)) continue;
      const combined = [...g1, ...groups[j]];
      if (isCondorShape(combined)) {
        partnerIdx = j;
        break;
      }
    }
    if (partnerIdx >= 0) {
      merged.push([...g1, ...groups[partnerIdx]]);
      used.add(i);
      used.add(partnerIdx);
    } else {
      merged.push(g1);
    }
  }
  return merged;
}

// equity legs first, then clusters per expiration labeled with the detected
// strategy; shared by the left panel and the position table.
//
// Grouping rules:
// 1. Start from order chains when available (how tastytrade actually opened the
//    positions).  Legs without a chain id are bucketed together as "unknown".
// 2. Merge chain groups whose exact strike / type / direction signature is
//    identical, so adding to the same strategy across multiple orders shows as
//    one line.
// 3. Non-identical strategies (including overlapping condors from different
//    orders) stay in separate groups.
// 4. Within each merged group, run shape decomposition so stacked identical
//    strategies are still labeled correctly.
// Find a subset of items whose weights exactly equal target (memoised DFS).
function findExactSubset(items, target, weightFn) {
  const n = items.length;
  const memo = new Map();
  const dfs = (i, remaining) => {
    if (remaining === 0) return [];
    if (i >= n || remaining < 0) return null;
    const key = `${i},${remaining}`;
    if (memo.has(key)) return memo.get(key);
    const w = weightFn(items[i]);
    const take = w <= remaining ? dfs(i + 1, remaining - w) : null;
    if (take) {
      const res = [items[i], ...take];
      memo.set(key, res);
      return res;
    }
    const skip = dfs(i + 1, remaining);
    memo.set(key, skip);
    return skip;
  };
  return dfs(0, target);
}

// Detect a Ratio Super Bull (RSB) or reverse RSB across all option legs.
// Standard RSB: 2 short OTM puts, 1 long ATM call, 1 short OTM call.
// Reverse RSB: 2 short OTM puts, 1 long ATM put,  1 short OTM call.
// Typically the long option is a LEAP and the short puts are near-term,
// so the legs may span expirations and order chains.  Returns the type or null.
// We search for an RSB *core* inside the full position so added wings/strangles
// don't hide the original strategy.
function detectRSB(legs, spot) {
  const opts = legs.filter(l => l.strike != null);
  if (opts.length < 3) return null;

  const hasSpot = spot != null && spot > 0;
  const otmPut = l => !hasSpot || l.strike < spot * 0.90;
  const otmCall = l => !hasSpot || l.strike > spot * 1.10;
  const longOk = l => !hasSpot || Math.abs(l.strike - spot) / spot <= 0.25;

  // Try standard RSB: for each long call, look for short puts totaling 2x qty
  // and a short call with matching qty, all ordered around the long call.
  for (const longCall of opts.filter(l => l.option_type === "C" && l.qty > 0)) {
    const q = longCall.qty;
    const puts = opts.filter(l => l !== longCall && l.option_type === "P" && l.qty < 0 && l.strike < longCall.strike && otmPut(l));
    const shortCalls = opts.filter(l => l !== longCall && l.option_type === "C" && l.qty < 0 && l.strike > longCall.strike && otmCall(l));
    const putQty = puts.reduce((total, l) => total - l.qty, 0);
    const shortCallQty = shortCalls.reduce((total, l) => total - l.qty, 0);
    if (putQty >= 2 * q && shortCallQty >= q && longOk(longCall))
      return "🐂RSB";
  }

  // Try reverse RSB: for each long put, look for short puts totaling 2x qty
  // and a short call with matching qty.
  for (const longPut of opts.filter(l => l.option_type === "P" && l.qty > 0)) {
    const q = longPut.qty;
    const puts = opts.filter(l => l !== longPut && l.option_type === "P" && l.qty < 0 && l.strike < longPut.strike && otmPut(l));
    const shortCalls = opts.filter(l => l !== longPut && l.option_type === "C" && l.qty < 0 && l.strike > longPut.strike && otmCall(l));
    const putQty = puts.reduce((total, l) => total - l.qty, 0);
    const shortCallQty = shortCalls.reduce((total, l) => total - l.qty, 0);
    if (putQty >= 2 * q && shortCallQty >= q && longOk(longPut))
      return "🐻Reverse RSB";
  }

  return null;
}

function clusterLegs(legs) {
  const clusters = [];
  const eq = legs.filter(l => l.strike == null);
  if (eq.length) clusters.push({
    label: eq[0].symbol?.includes("/") ? "Futures" : "Stock", legs: eq });
  const byExp = {};
  for (const l of legs) if (l.strike != null) (byExp[l.expiration] ??= []).push(l);

  const sig = ls => {
    const parts = ls.map(l => `${l.strike}:${l.option_type}:${Math.sign(l.qty)}`);
    return [...new Set(parts)].sort().join("|");
  };

  for (const exp of Object.keys(byExp).sort()) {
    const dl = byExp[exp];
    // Split by order chain when any leg has chain info.
    const byChain = {};
    for (const l of dl) {
      const c = l.chain == null ? "__unknown__" : l.chain;
      (byChain[c] ??= []).push(l);
    }
    let groups = Object.values(byChain).map(g => g.map(l => ({...l})));

    // Merge identical signatures across chains/orders.
    const merged = [];
    for (const g of groups) {
      const key = sig(g);
      const idx = merged.findIndex(m => sig(m) === key);
      if (idx >= 0) {
        for (const leg of g) {
          const match = merged[idx].find(l =>
            l.strike === leg.strike && l.option_type === leg.option_type);
          if (match) match.qty += leg.qty;
          else merged[idx].push(leg);
        }
      } else {
        merged.push(g);
      }
    }

    // Merge separate chains/orders that together form a condor shape.
    const afterCondor = mergeCondorGroups(merged);

    for (const m of afterCondor) {
      for (const sub of decompose(m.sort((a, b) =>
        a.strike - b.strike || (a.option_type === "P" ? -1 : 1)))) {
        sub.sort((a, b) => a.strike - b.strike || (a.option_type === "P" ? -1 : 1));
        clusters.push({ label: `${classify(sub)} · ${dteDays(sub[0])}d`, legs: sub });
      }
    }
  }
  return clusters;
}

function GroupLegs({ legs, spot }) {
  const rsb = detectRSB(legs, spot);
  return html`
    ${rsb ? html`<div class="rsbbadge">${rsb}</div>` : null}
    ${clusterLegs(legs).map(c => html`
    <div key=${c.label + ":" + c.legs[0].symbol}>
      <div class="subexp">${c.label}</div>
      ${c.legs.map(l => html`<${LegPills} key=${l.symbol} l=${l} />`)}
    </div>`)}
  `;
}

function App() {
  const [setup, setSetup] = useState(null);       // /api/setup/validate result
  const [account, setAccount] = useState(null);
  const [groups, setGroups] = useState({});
  const [sel, setSel] = useState(null);
  const [ana, setAna] = useState(null);
  const [quotes, setQuotes] = useState({});
  const [wsOn, setWsOn] = useState(false);
  const [setupErr, setSetupErr] = useState(null);
  const [hiddenLegs, setHiddenLegs] = useState(new Set());  // per-strategy chart toggles
  const anaTimer = useRef(null);
  const leftRef = useRef(null);
  const scrolledSelection = useRef(null);
  const hideParam = [...hiddenLegs].sort().join(",");

  // fetch positions; on initial load also pick a default selection
  const loadPositions = useCallback((preserveSel = true) => {
    if (!account) return;
    fetch(api(`/api/positions/${account}`))
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d => {
        setGroups(d.groups);
        if (!preserveSel) {
          const keys = Object.keys(d.groups);
          const saved = localStorage.getItem("tastier.sel");
          if (keys.length) setSel(s => s ?? (saved && d.groups[saved] ? saved : keys[0]));
        }
      })
      .catch(() => {});
  }, [account]);

  // toggle a whole strategy cluster's legs in/out of the chart
  const toggleCluster = syms => {
    setHiddenLegs(h => {
      const n = new Set(h);
      const allHidden = syms.every(s => n.has(s));
      syms.forEach(s => allHidden ? n.delete(s) : n.add(s));
      return n;
    });
    loadPositions(true);
  };

  // retry until the backend answers, so a restart mid-load can't strand
  // the page on "Checking setup…"
  useEffect(() => {
    let alive = true;
    const check = async () => {
      try {
        const ctl = new AbortController();
        const t = setTimeout(() => ctl.abort(), 10000);
        const r = await fetch(api("/api/setup/validate"), { signal: ctl.signal });
        clearTimeout(t);
        const s = await r.json();
        if (!alive) return;
        setSetupErr(null);
        setSetup(s);
        if (s.ok && s.accounts.length) setAccount(s.accounts[0].account_number);
      } catch (e) {
        if (!alive) return;
        setSetupErr(e.name === "AbortError" ? "timed out after 10s" : (e.message || String(e)));
        setTimeout(check, 2000);
      }
    };
    check();
    return () => { alive = false; };
  }, []);

  // load positions on account change, refresh every 30s, and retry on error
  useEffect(() => {
    if (!account) return;
    let alive = true;
    const load = () => {
      if (!alive) return;
      loadPositions(false);
      setTimeout(load, 30000);
    };
    load();
    return () => { alive = false; };
  }, [account, loadPositions]);

  // websocket quotes
  useEffect(() => {
    if (!account) return;
    let ws, alive = true, ping;
    const connect = () => {
      ws = new WebSocket(wsUrl("/ws/quotes"));
      ws.onopen = () => { setWsOn(true);
        ping = setInterval(() => ws.readyState === 1 && ws.send("ping"), 15000); };
      ws.onmessage = e => {
        const m = JSON.parse(e.data);
        if (m.symbol) setQuotes(q => {
          const prev = q[m.symbol], next = {...prev, ...m};
          if (m.mid != null && prev?.mid != null && m.mid !== prev.mid)
            next.dir = m.mid > prev.mid ? "up" : "dn";
          return {...q, [m.symbol]: next};
        });
      };
      ws.onclose = () => { setWsOn(false); clearInterval(ping);
        if (alive) setTimeout(connect, 1500); };
    };
    connect();
    return () => { alive = false; ws && ws.close(); clearInterval(ping); };
  }, [account]);

  // refresh positions whenever the user changes the selected position or sub-filter
  useEffect(() => {
    if (!account || !sel) return;
    loadPositions(true);
  }, [account, sel, loadPositions]);

  useEffect(() => {
    if (!account) return;
    loadPositions(true);
  }, [account, hideParam, loadPositions]);

  // clear strategy toggles when switching underlyings
  useEffect(() => setHiddenLegs(new Set()), [sel]);

  useEffect(() => {
    if (!account || !sel || !groups[sel]) return;
    const key = `${account}:${sel}`;
    if (scrolledSelection.current === key) return;
    const frame = requestAnimationFrame(() => {
      const selected = leftRef.current?.querySelector(".group.sel");
      if (!selected) return;
      selected.scrollIntoView({ block: "nearest" });
      scrolledSelection.current = key;
    });
    return () => cancelAnimationFrame(frame);
  }, [account, sel, groups]);

  // refresh analysis when selection/toggles change + every 3s (T+0 uses live IV/spot)
  useEffect(() => {
    if (!account || !sel) return;
    const qs = hideParam ? `?hide=${encodeURIComponent(hideParam)}` : "";
    const load = () => fetch(api(`/api/analysis/${account}/${sel}${qs}`))
      .then(r => r.ok ? r.json() : null).then(d => d && setAna(d))
      .catch(() => {});  // poll again on the next interval
    load();
    anaTimer.current = setInterval(load, 3000);
    return () => clearInterval(anaTimer.current);
  }, [account, sel, hideParam]);

  if (!setup) return html`<div class="empty">Checking setup…
    ${setupErr ? html`<div class="prob" style=${{marginTop:'10px'}}>
      backend not responding (${setupErr}) — retrying…</div>` : ''}</div>`;
  if (!setup.ok) return html`<${SetupHelp} setup=${setup} />`;

  const spotQ = quotes[sel] || {};
  const stale = spotQ.ts && (Date.now()/1000 - spotQ.ts) > 10;

  return html`
    <header>
      <h1>TASTIER LIVE ANALYSIS</h1>
      <span class="env ${setup.env==='live'?'live':''}">${setup.env.toUpperCase()}</span>
      <span class="acct" title="hover to reveal">
        <span class="acct-mask">acct ${'•'.repeat(Math.max(0,(account||'').length))}</span>
        <span class="acct-full">acct ${account}</span>
      </span>
      <span class="conn ${wsOn?'on':''}"><span class="dot"></span>${wsOn?'stream live':'stream down'}</span>
    </header>
    <main>
      <div id="left" ref=${leftRef}>
        ${Object.entries(groups).map(([u, legs]) => {
          const q = quotes[u]?.mid != null ? quotes[u]
                  : quotes[legs[0]?.underlying_streamer] || {};
          return html`
          <div key=${u} class="group ${sel===u?'sel':''}"
               onClick=${() => { loadPositions(true); setSel(u); localStorage.setItem("tastier.sel", u); }}>
            <div class="ghead">
              <${TickerLogo} sym=${u.replace(/^\//, "")} size=${16} className="glogo" />
              <span class="u">${u}</span>
              <span class="px ${q.dir || ''}">${fmt(q.mid)}</span>
            </div>
            <${GroupLegs} legs=${legs} spot=${q.mid} />
          </div>`;})}
        ${!Object.keys(groups).length && html`<div class="empty">No open positions</div>`}
      </div>
      <div id="right">
        ${ana ? html`<${Analysis} ana=${ana} stale=${stale} sel=${sel} account=${account}
                       hidden=${hiddenLegs} onToggle=${toggleCluster} />`
              : html`<div class="empty">Select a position</div>`}
      </div>
    </main>`;
}

// custom overlay: center price strip, top P/L@EXP row, bottom theta row, lot flags
function chartOverlay(props, ana, yc) {
  const xMap = props.xAxisMap, yMap = props.yAxisMap;
  if (!xMap || !yMap) return null;
  const x = Object.values(xMap)[0].scale, y = Object.values(yMap)[0].scale;
  const { left, top, width, height } = props.offset;
  const y0 = y(0), right = left + width, bottom = top + height;
  const HALF = 13;                       // half-height of the center price strip
  const font = "Consolas, monospace";
  const FS = 13;                         // base font size for chart labels
  const tf = yc ? yc.tf : (v => v);      // P/L $ -> plot units

  const gridXs = ana.grid, expA = ana.expiration_pl, t0A = ana.t0_pl || [];
  const [lo, hi] = x.domain();  // reflects the current zoom window
  const step = niceStep((hi - lo) / Math.max(4, Math.floor(width / 48)));
  // only as many decimals as the step actually needs (72.5 vs 450)
  const dec = Number.isInteger(step) ? 0 : (Number.isInteger(step * 10) ? 1 : 2);
  const ticks = [];
  for (let t = Math.ceil(lo / step) * step; t <= hi + 1e-9; t += step)
    ticks.push(+t.toFixed(6));
  // keep tick value labels clear of the corner row labels (now inside the plot)
  const rowTicks = ticks.filter(t => x(t) > left + 88 && x(t) < right - 88);

  // right-edge series labels, de-overlapped; the nearest expiration is the
  // shaded (green) primary, later expirations are lines, T+0 is orange
  const hasOpts = (ana.legs || []).some(l => l.strike != null);
  const seriesLabels = [
    { v: interp(gridXs, ana.t0_pl, hi), color: "#f59e0b", txt: "T+0" },
    ...(ana.curves || []).map((c, j) => ({
      v: interp(gridXs, c.pl, hi),
      color: DTE_SHADES[j % DTE_SHADES.length].line,
      txt: c.label || (c.dte_days + "d") })),
    ...(hasOpts ? [{ v: interp(gridXs, expA, hi), color: "#8fd8a8",
                     txt: (ana.exp_dte ?? "") + "dte" }] : []),
  ].map(s => ({ ...s, yy: Math.min(Math.max(y(tf(s.v)), top + 12), bottom - 6) }))
   .sort((a, b) => a.yy - b.yy);
  for (let i = 1; i < seriesLabels.length; i++)
    if (seriesLabels[i].yy - seriesLabels[i - 1].yy < 15)
      seriesLabels[i].yy = seriesLabels[i - 1].yy + 15;

  // right-hand P/L axis: dollar ticks for the linear scale, skipping the strip band;
  // wheel over the right gutter zooms the whole Y axis.
  const axTicks = [];
  if (yc) {
    for (const sign of [1, -1]) {
      const vEdge = (sign > 0 ? yc.pos : yc.neg) / (0.9 * yc.zoom);
      const stepY = niceStep(vEdge / 4);
      for (let v = stepY; v <= vEdge * 1.001; v += stepY) {
        const yy = y(tf(sign * v));
        if (yy < top + 10 || yy > bottom - 4) continue;
        if (Math.abs(yy - y0) < HALF + 10) continue;
        axTicks.push({ yy, txt: (sign < 0 ? "-" : "") + fmtK(v),
                       color: sign > 0 ? "#2dd4a7" : "#ff5d73" });
      }
    }
  }

  // lot flags: long above the strip, short below; stagger when crowded
  const FW = 33, FH = 18, GAP = 9;
  const flags = (ana.legs || []).filter(l => l.strike != null && l.strike >= lo && l.strike <= hi)
    .map(l => ({ xx: x(l.strike), up: l.qty > 0, label: `${l.qty}${l.option_type}` }))
    .sort((a, b) => a.xx - b.xx);
  const lastAt = { up: [], dn: [] };     // last x per stagger level, per side
  for (const f of flags) {
    const lv = lastAt[f.up ? "up" : "dn"];
    let i = 0;
    while (i < lv.length && f.xx - lv[i] < FW + 6) i++;
    lv[i] = f.xx;
    f.lvl = i;
  }

  return html`<g>
    <!-- top row: P/L at expiration -->
    <text x=${left + 2} y=${top - 9} fill="#8b97a8" font-size=${FS} font-family=${font}>P/L @ EXP</text>
    <text x=${right - 2} y=${top - 9} text-anchor="end" fill="#8b97a8" font-size=${FS} font-family=${font}>P/L @ EXP</text>
    ${rowTicks.map(t => html`
      <text key=${"e" + t} x=${x(t)} y=${top - 9} text-anchor="middle" font-size=${FS}
            font-family=${font} fill=${signColor(interp(gridXs, expA, t))}>
        ${fmtK(interp(gridXs, expA, t))}</text>`)}

    <!-- vertical guides (drawn first so the strip covers them) -->
    ${ana.breakevens.filter(b => b >= lo && b <= hi).map(b => html`
      <line key=${"bl" + b} x1=${x(b)} x2=${x(b)} y1=${top} y2=${bottom}
            stroke="#f5b94e" stroke-dasharray="4 4" />`)}
    ${ana.spot >= lo && ana.spot <= hi ? html`
      <line x1=${x(ana.spot)} x2=${x(ana.spot)} y1=${top} y2=${bottom}
            stroke="#7aa5ff" stroke-width="1.5" />` : null}

    <!-- center price strip -->
    <rect x=${left} y=${y0 - HALF} width=${width} height=${HALF * 2} fill="#10151d"
          fill-opacity="0.15" />
    <line x1=${left} x2=${right} y1=${y0 - HALF} y2=${y0 - HALF} stroke="#2a3341" />
    <line x1=${left} x2=${right} y1=${y0 + HALF} y2=${y0 + HALF} stroke="#2a3341" />
    ${ticks.filter(t => Math.abs(x(t) - x(ana.spot)) > 22).map(t => html`
      <text key=${"p" + t} x=${x(t)} y=${y0 + 4.5} text-anchor="middle" font-size=${FS}
            font-family=${font} fill="#8b97a8">${fmt(t, dec)}</text>`)}
    ${ana.spot >= lo && ana.spot <= hi ? html`
      <circle cx=${x(ana.spot)} cy=${y0} r=${4} fill="#dfe6ef" stroke="#0e1116" />` : null}

    <!-- breakeven tags on the strip -->
    ${ana.breakevens.filter(b => b >= lo && b <= hi).map(b => html`
      <g key=${"b" + b}>
        <rect x=${x(b) - 29} y=${y0 - HALF - 19} width=${58} height=${17} rx=${3}
              fill="#2b2413" stroke="#f5b94e" stroke-width="0.5" />
        <text x=${x(b)} y=${y0 - HALF - 6} text-anchor="middle" font-size="12"
              font-family=${font} fill="#f5b94e">${fmt(b, 2)}</text>
      </g>`)}

    <!-- lot flags -->
    ${flags.map((f, i) => {
      const yr = f.up ? y0 - HALF - 22 - FH - f.lvl * (FH + 4)
                      : y0 + HALF + 22 + f.lvl * (FH + 4);
      return html`<g key=${"f" + i}>
        <line x1=${f.xx} x2=${f.xx} y1=${f.up ? yr + FH : y0 + HALF}
              y2=${f.up ? y0 - HALF : yr} stroke="#4a5568" />
        <rect x=${f.xx - FW/2} y=${yr} width=${FW} height=${FH} rx=${3}
              fill="#1d242f" stroke="#3a4656" />
        <rect x=${f.xx - FW/2} y=${yr} width=${3} height=${FH} fill="#ff5d73" />
        <text x=${f.xx + 1.5} y=${yr + FH - 5} text-anchor="middle" font-size="12"
              font-family=${font} fill="#dfe6ef">${f.label}</text>
      </g>`;})}

    <!-- bottom row: theoretical (T+0) P/L -->
    <text x=${left + 2} y=${bottom + 20} fill="#8b97a8" font-size=${FS} font-family=${font}>P/L THEO</text>
    <text x=${right - 2} y=${bottom + 20} text-anchor="end" fill="#8b97a8" font-size=${FS} font-family=${font}>P/L THEO</text>
    ${t0A.length ? rowTicks.map(t => html`
      <text key=${"t" + t} x=${x(t)} y=${bottom + 20} text-anchor="middle" font-size=${FS}
            font-family=${font} fill=${signColor(interp(gridXs, t0A, t))}>
        ${fmtK(interp(gridXs, t0A, t))}</text>`) : null}

    <!-- right-hand P/L axis (mousewheel over this gutter zooms Y) -->
    ${axTicks.map((a, i) => html`
      <text key=${"ay" + i} x=${right - 4} y=${a.yy} text-anchor="end"
            font-size=${FS} font-family=${font} fill=${a.color}
            stroke="#0e1116" stroke-width="3" paint-order="stroke">${a.txt}</text>`)}

    <!-- per-curve DTE labels at the right edge -->
    ${seriesLabels.map(s => html`
      <text key=${"sl" + s.txt} x=${right - 52} y=${s.yy} text-anchor="end"
            font-size="12" font-family=${font} fill=${s.color}
            stroke="#0e1116" stroke-width="3" paint-order="stroke">${s.txt}</text>`)}
  </g>`;
}

// Map an underlying to a TradingView symbol. Cash indices use freely
// embeddable proxies — the licensed index feeds (e.g. SP:SPX) throw
// "only available on TradingView" in third-party embeds, but the FOREX.com
// CFD proxies (SPXUSD, etc.) render fine. Futures use the continuous
// front-month contract; equities pass through.
const TV_SYMBOL = {
  SPX: "OANDA:SPX500USD",
  // NDX: "FOREXCOM:NSXUSD", NDXP: "FOREXCOM:NSXUSD", RUT: "FOREXCOM:US2000",
  // DJX: "FOREXCOM:DJI", VIX: "TVC:VIX", VX: "TVC:VIX",
};
// Futures that render as explicit monthly contracts on TradingView rather than
// continuous contracts (e.g. /CLU6 -> CLU2026).
const MONTHLY_FUTURES = new Set(["CL"]);
function tvSymbol(sel) {
  if (!sel) return "";
  if (TV_SYMBOL[sel]) return TV_SYMBOL[sel];
  if (sel.startsWith("/")) {
    // Try /ROOTMONTHYEAR first (e.g. /CLU6 or /CLU26)
    const m = sel.slice(1).match(/^([A-Z0-9]+?)([FGHJKMNQUVXZ])(\d{1,2})$/);
    if (m) {
      const base = m[1];
      const month = m[2];
      let yr = parseInt(m[3], 10);
      const currentYear = new Date().getFullYear();
      let fullYear;
      if (yr < 10) {
        fullYear = Math.floor(currentYear / 10) * 10 + yr;
        if (fullYear < currentYear) fullYear += 10;
      } else {
        fullYear = 2000 + yr;
      }
      if (MONTHLY_FUTURES.has(base)) return `${base}${month}${fullYear}`;
      if (TV_SYMBOL[base]) return TV_SYMBOL[base];
      return `${base}${month}${fullYear}`;
    }
    // Otherwise fall back to continuous front-month contract.
    const m2 = sel.slice(1).match(/^([A-Z0-9]+)/);
    const base = m2 ? m2[1] : sel.slice(1);
    if (TV_SYMBOL[base]) return TV_SYMBOL[base];
    return base + "1!";
  }
  return sel;
}

// TradingView advanced-chart embed (5m bars over 5 trading days, dark,
// toolbars hidden) — matches the tradeclock.fyi ticker. Falls back to the
// local DXLink candle chart if the embed script can't load (offline).
function TVTicker({ symbol, sel }) {
  const boxRef = useRef(null);
  const [failed, setFailed] = useState(false);
  const tv = tvSymbol(sel);
  useEffect(() => {
    setFailed(false);
    const box = boxRef.current;
    if (!box || !tv) return;
    box.innerHTML = "";
    const wrap = document.createElement("div");
    wrap.className = "tradingview-widget-container";
    const inner = document.createElement("div");
    inner.className = "tradingview-widget-container__widget";
    wrap.appendChild(inner);
    const s = document.createElement("script");
    s.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
    s.async = true;
    s.onerror = () => setFailed(true);
    s.innerHTML = JSON.stringify({
      symbol: tv, interval: "5", range: "5D", theme: "dark", style: "1",
      locale: "en", autosize: true, hide_top_toolbar: true, hide_legend: true,
      hide_side_toolbar: true, allow_symbol_change: false, save_image: false,
      calendar: false, withdateranges: false,
      backgroundColor: "#161b23", gridColor: "#2a3341",
    });
    wrap.appendChild(s);
    box.appendChild(wrap);
    return () => { box.innerHTML = ""; };
  }, [tv]);
  if (failed) return html`<${CandleChart} symbol=${symbol} />`;
  return html`<div class="tvbox">
    <div class="tvwatermark"><span>${tv}</span></div>
    <div ref=${boxRef} style=${{position:"absolute",inset:0,zIndex:1}}></div>
  </div>`;
}

// 1-minute mini candlestick chart for the selected group's spot symbol,
// fed by the local DXLink candle relay (/api/candles). Supports wheel zoom
// (centered on cursor), drag pan, and double-click reset — the view window
// is {n visible bars, endOffset bars hidden past the right edge}.
const CANDLE_DEFAULT_N = 75;
function CandleChart({ symbol }) {
  const [cs, setCs] = useState(null);
  const [view, setView] = useState(null);   // {n, endOffset} or null = default
  const [hoverFrac, setHoverFrac] = useState(null);  // cursor x fraction, 0..1
  const boxRef = useRef(null);
  const viewRef = useRef(null); viewRef.current = view;
  const csRef = useRef(null); csRef.current = cs;

  useEffect(() => {
    if (!symbol) return;
    let alive = true;
    setCs(null); setView(null);
    const load = () => fetch(api(`/api/candles/${encodeURIComponent(symbol)}`))
      .then(r => r.ok ? r.json() : [])
      .then(d => { if (alive) setCs(d); })
      .catch(() => {});
    load();
    const t = setInterval(load, 15000);
    return () => { alive = false; clearInterval(t); };
  }, [symbol]);

  useEffect(() => {
    const el = boxRef.current;
    if (!el) return;
    const total = () => (csRef.current || []).length;
    const cur = () => viewRef.current
      || { n: Math.min(CANDLE_DEFAULT_N, total() || CANDLE_DEFAULT_N), endOffset: 0 };
    const onWheel = e => {
      e.preventDefault();
      const N = total(); if (!N) return;
      const { n, endOffset } = cur();
      const rightIdx = N - endOffset, startIdx = Math.max(0, rightIdx - n);
      const r = el.getBoundingClientRect();
      const f = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
      const barUnder = startIdx + f * (rightIdx - startIdx);
      let n2 = Math.round(n * (e.deltaY > 0 ? 1.25 : 0.8));
      n2 = Math.max(10, Math.min(N, n2));
      const eo = Math.max(0, Math.min(N - n2, N - (barUnder - f * n2 + n2)));
      setView({ n: n2, endOffset: Math.round(eo) });
    };
    let drag = null;
    const down = e => { if (e.button !== 0) return;
      drag = { x: e.clientX, view: cur() }; e.preventDefault(); };
    const move = e => {
      if (!drag) return;
      const N = total(); if (!N) return;
      const r = el.getBoundingClientRect();
      const { n, endOffset } = drag.view;
      const dBars = (e.clientX - drag.x) / r.width * n;  // px -> bars, drag right = older
      setView({ n, endOffset: Math.max(0, Math.min(N - n, Math.round(endOffset + dBars))) });
    };
    const up = () => { drag = null; };
    const dbl = () => setView(null);
    el.addEventListener("wheel", onWheel, { passive: false });
    el.addEventListener("mousedown", down);
    el.addEventListener("dblclick", dbl);
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    return () => {
      el.removeEventListener("wheel", onWheel);
      el.removeEventListener("mousedown", down);
      el.removeEventListener("dblclick", dbl);
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
    };
  }, []);

  if (!cs) return html`<div class="candlebox" ref=${boxRef}><div class="candle-empty">loading candles…</div></div>`;
  if (!cs.length) return html`<div class="candlebox" ref=${boxRef}><div class="candle-empty">no intraday data</div></div>`;
  const v = view || { n: Math.min(CANDLE_DEFAULT_N, cs.length), endOffset: 0 };
  const rightIdx = cs.length - v.endOffset, startIdx = Math.max(0, rightIdx - v.n);
  const bars = cs.slice(startIdx, rightIdx);
  if (!bars.length) return html`<div class="candlebox" ref=${boxRef}><div class="candle-empty">no intraday data</div></div>`;
  const lo = Math.min(...bars.map(b => b.l)), hi = Math.max(...bars.map(b => b.h));
  const H = 120, bw = 7, W = bars.length * bw, padY = 10;
  const span = hi - lo || 1;
  const y = p => H - padY - (p - lo) / span * (H - 2 * padY);
  const yPct = p => y(p) / H * 100;
  const last = bars[bars.length - 1];
  const chg = (last.c - bars[0].o) / (bars[0].o || 1) * 100;
  const hm = t => { const d = new Date(t);
    return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0"); };
  const yTicks = [hi, lo + span / 2, lo];
  const nx = Math.min(4, bars.length);
  const xTicks = Array.from({ length: nx }, (_, k) =>
    Math.round(k * (bars.length - 1) / (nx - 1 || 1)));
  const hi_ = hoverFrac == null ? null
    : Math.max(0, Math.min(bars.length - 1, Math.floor(hoverFrac * bars.length)));
  const hb = hi_ == null ? null : bars[hi_];
  const onHover = e => {
    const r = boxRef.current.getBoundingClientRect();
    setHoverFrac(Math.min(1, Math.max(0, (e.clientX - r.left) / r.width)));
  };
  return html`
    <div class="candlebox" ref=${boxRef}
         onMouseMove=${onHover} onMouseLeave=${() => setHoverFrac(null)}>
      <svg viewBox=${`0 0 ${W} ${H}`} preserveAspectRatio="none">
        ${bars.map((b, i) => {
          const cx = i * bw + bw / 2, up = b.c >= b.o, col = up ? "#2dd4a7" : "#ff5d73";
          return html`<g key=${b.t}>
            <line x1=${cx} x2=${cx} y1=${y(b.h)} y2=${y(b.l)} stroke=${col} />
            <rect x=${cx - 2.5} width="5" y=${y(Math.max(b.o, b.c))}
                  height=${Math.max(1, Math.abs(y(b.o) - y(b.c)))} fill=${col} />
          </g>`;})}
        ${hb ? html`<line x1=${hi_ * bw + bw / 2} x2=${hi_ * bw + bw / 2}
              y1=${0} y2=${H} stroke="#8b97a8" stroke-width="0.6" stroke-dasharray="3 3" />` : null}
      </svg>
      ${yTicks.map((p, i) => html`
        <div key=${"y" + i} class="cax y" style=${{top: yPct(p) + "%"}}>${fmt(p, 2)}</div>`)}
      ${xTicks.map(i => html`
        <div key=${"x" + i} class="cax x"
             style=${{left: (i + 0.5) / bars.length * 100 + "%", top: "90%"}}>${hm(bars[i].t)}</div>`)}
      ${hb ? html`<div class="chair-tag"
             style=${{left: Math.min(92, Math.max(8, (hi_ + 0.5) / bars.length * 100)) + "%"}}>
             <b>${fmt(hb.c)}</b> · ${hm(hb.t)}</div>` : null}
      <div class="cinfo">${symbol} · 1m · <b>${fmt(last.c)}</b>
        <span class="num ${chg >= 0 ? 'pos' : 'neg'}"> ${chg >= 0 ? '+' : ''}${fmt(chg, 2)}%</span></div>
    </div>`;
}

function ChartTip({ active, payload, curves }) {
  if (!active || !payload || !payload.length) return null;
  const d = payload[0].payload;
  const row = (k, v, c) => html`
    <div style=${{display:'flex',justifyContent:'space-between',gap:'18px'}}>
      <span style=${{color:'#8b97a8'}}>${k}</span><span style=${{color:c}}>${v}</span>
    </div>`;
  return html`
    <div style=${{background:'#1d242fee',border:'1px solid #2a3341',borderRadius:'4px',
                  padding:'8px 10px',font:'13px Consolas, monospace'}}>
      ${row("PRICE", fmt(d.spot), "#dfe6ef")}
      ${row("P/L THEO", fmt(d.t0), signColor(d.t0))}
      ${(curves || []).map((c, j) => row(`P/L ${c.label || c.dte_days + "d"}`, fmt(d["c" + j]),
          signColor(d["c" + j])))}
      ${row("P/L EXP", fmt(d.exp), signColor(d.exp))}
      ${row("θ THEO", fmt(d.theta), "#c26bd4")}
    </div>`;
}

function Analysis({ ana, stale, sel, account, hidden, onToggle }) {
  const data = useMemo(() => ana.grid.map((s, i) => ({
    spot: s, exp: ana.expiration_pl[i], t0: ana.t0_pl[i],
    theta: (ana.theta || [])[i] ?? 0,
    expPos: Math.max(ana.expiration_pl[i], 0),
    expNeg: Math.min(ana.expiration_pl[i], 0),
    ...Object.fromEntries((ana.curves || []).flatMap((c, j) => {
      const expVal = ana.expiration_pl[i];
      const cVal = c.pl[i];
      const cPos = Math.max(cVal, 0);
      return [
        ["c" + j, cVal],
        ["cPos" + j, cPos],
        ["cFill" + j, expVal > 0 ? cPos : 0],
      ];
    })),
  })), [ana]);
  // Linear vertical scale based on the largest absolute expiration P/L so the
  // green/red expiration lines stay aligned through the center strip.  yZoom
  // (mousewheel over the right-hand P/L axis) scales the whole Y axis.
  const [yZoom, setYZoom] = useState(1);
  useEffect(() => setYZoom(1), [sel]);
  // Single linear vertical scale based on the largest absolute expiration P/L.
  // This keeps the green/red expiration lines aligned (same slope through zero)
  // like the tastytrade payoff chart.  T+0 and other DTE curves may overflow.
  const scales = useMemo(() => {
    const m = Math.max(ana.max_profit, -ana.max_loss, 1);
    return { pos: m, neg: m };
  }, [ana]);
  const tf = v => (v >= 0 ? v / scales.pos : v / scales.neg) * 0.9 * yZoom;
  const plotData = useMemo(() => data.map(d => ({
    ...d,   // originals stay for the tooltip
    pExpPos: tf(d.expPos), pExpNeg: tf(d.expNeg), pT0: tf(d.t0),
    ...Object.fromEntries((ana.curves || []).flatMap((c, j) => [
      ["pC" + j, tf(d["c" + j])],
      ["pCFill" + j, tf(d["cFill" + j])],
    ])),
  })), [data, scales, yZoom]);

  // x-axis zoom (wheel, centered on cursor) and pan (drag); dblclick resets
  const [view, setView] = useState(null);           // [lo, hi] or null = full
  const chartRef = useRef(null);
  const viewRef = useRef(null); viewRef.current = view;
  const fullRef = useRef([0, 1]);
  fullRef.current = [ana.grid[0], ana.grid[ana.grid.length - 1]];
  useEffect(() => setView(null), [sel]);
  useEffect(() => {
    const el = chartRef.current;
    if (!el) return;
    const PAD = 12 + 12;  // #chart padding + chart margin
    const clamp = (lo, hi) => {
      const [flo, fhi] = fullRef.current, span = hi - lo;
      if (lo < flo) { lo = flo; hi = flo + span; }
      if (hi > fhi) { hi = fhi; lo = fhi - span; }
      return (hi - lo) >= (fhi - flo) - 1e-9 ? null : [Math.max(flo, lo), Math.min(fhi, hi)];
    };
    const onWheel = e => {
      e.preventDefault();
      const r = el.getBoundingClientRect();
      if (e.clientX > r.right - 70) {
        // over the right-hand P/L axis: zoom the vertical scale instead
        setYZoom(z => Math.min(8, Math.max(0.25, z * (e.deltaY > 0 ? 1 / 1.15 : 1.15))));
        return;
      }
      const [flo, fhi] = fullRef.current;
      const [lo, hi] = viewRef.current || [flo, fhi];
      const frac = Math.min(1, Math.max(0, (e.clientX - r.left - PAD) / (r.width - 2 * PAD)));
      const p = lo + frac * (hi - lo);
      const f = e.deltaY > 0 ? 1.25 : 0.8;
      let nlo = p - (p - lo) * f, nhi = p + (hi - p) * f;
      const minSpan = (fhi - flo) * 0.04;
      if (nhi - nlo < minSpan) { const c = (nlo + nhi) / 2; nlo = c - minSpan / 2; nhi = c + minSpan / 2; }
      setView(clamp(nlo, nhi));
    };
    let drag = null;
    const down = e => { if (e.button !== 0) return;
      drag = { x: e.clientX, view: viewRef.current || fullRef.current.slice() };
      el.style.cursor = "grabbing"; e.preventDefault(); };
    const move = e => {
      if (!drag) return;
      const r = el.getBoundingClientRect();
      const [lo, hi] = drag.view;
      const dP = (e.clientX - drag.x) / (r.width - 2 * PAD) * (hi - lo);
      setView(clamp(lo - dP, hi - dP));
    };
    const up = () => { drag = null; el.style.cursor = ""; };
    const dbl = () => { setView(null); setYZoom(1); };
    el.addEventListener("wheel", onWheel, { passive: false });
    el.addEventListener("mousedown", down);
    el.addEventListener("dblclick", dbl);
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    return () => {
      el.removeEventListener("wheel", onWheel);
      el.removeEventListener("mousedown", down);
      el.removeEventListener("dblclick", dbl);
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
    };
  }, []);

  const [topbarH, setTopbarH] = useState(200);
  const [chartH, setChartH] = useState(480);
  const [topleftW, setTopleftW] = useState(320);
  const dragTopbar  = useDividerDrag('y', d => setTopbarH(h => Math.max(80, h + d)));
  const dragChart   = useDividerDrag('y', d => setChartH(h => Math.max(120, h + d)));
  const dragTopleft = useDividerDrag('x', d => setTopleftW(w => Math.max(120, w + d)));

  const pct = ana.net_open_cost ? ana.live_pl / Math.abs(ana.net_open_cost) * 100 : null;
  const sv = (v, txt) => html`<span class="num ${v>0?'pos':v<0?'neg':''}">${txt}</span>`;
  const cell = (k, v) => html`<div class="scell"><div class="k">${k}</div><div class="v">${v}</div></div>`;
  const candleSym = ana.legs?.[0]?.underlying_streamer || sel;
  const logoSym = (sel || "").replace(/^\//, "");
  return html`
    <div class="rstack">
      <div class="topbar" style=${{height: topbarH + "px"}}>
        <div class="topleft" style=${{flex: `0 0 ${topleftW}px`}}>
          <div class="syminfo">
            <${TickerLogo} key=${logoSym} sym=${logoSym} size=${30} />
            <span class="symname">${sel}</span>
            ${ana.description ? html`<span class="symdesc">${ana.description}</span>` : ''}
          </div>
          <div class="sumgrid">
            ${cell("Live P/L", sv(ana.live_pl, money(ana.live_pl)))}
            ${cell("P/L Opn%", pct == null ? "—" : sv(pct, fmt(pct, 1) + "%"))}
            ${cell("P/L Day", ana.pl_day == null ? "—" : sv(ana.pl_day, money(ana.pl_day)))}
            ${cell("Spot", html`${fmt(ana.spot)}${stale ? html`<span class="stale">stale</span>` : ''}`)}
            ${cell("Max Profit", sv(1, money(ana.max_profit)))}
            ${cell("Max Loss", sv(-1, money(ana.max_loss)))}
            ${cell("Breakevens", ana.breakevens.map(b => fmt(b, 1)).join("/") || "—")}
          </div>
        </div>
        <div class="vdivider" onMouseDown=${dragTopleft}></div>
        <${TVTicker} symbol=${candleSym} sel=${sel} />
      </div>
      <div class="hdivider" onMouseDown=${dragTopbar}></div>
      <div id="chart" ref=${chartRef} style=${{height: chartH + "px"}}>
        ${!(ana.legs || []).length ? html`
          <div class="candle-empty" style=${{height: "100%"}}>
            all strategies hidden — click a group row below to show one
          </div>` : html`
        <${ResponsiveContainer} width="100%" height="100%">
          <${ComposedChart} data=${plotData} margin=${{top:28,right:12,bottom:28,left:12}}>
            <${XAxis} dataKey="spot" hide=${true} type="number"
                      allowDataOverflow=${!!view}
                      domain=${view ?? ["dataMin", "dataMax"]} />
            <${YAxis} hide=${true} domain=${[-1, 1]} allowDataOverflow=${true} />
            <${Tooltip} content=${p => html`<${ChartTip} ...${p} curves=${ana.curves} />`} />
            ${(ana.curves || []).map((c, j) => html`
              <${React.Fragment} key=${"c" + j}>
                <${Area} type="linear" dataKey=${"pCFill" + j}
                         stroke=${DTE_SHADES[j % DTE_SHADES.length].line} strokeWidth=${1.5}
                         fill=${DTE_SHADES[j % DTE_SHADES.length].fill} fillOpacity=${0.45}
                         baseValue=${0} dot=${false} activeDot=${false}
                         isAnimationActive=${false} name=${c.label || (c.dte_days + "d")} />
                <${Line} type="linear" dataKey=${"pC" + j}
                         stroke=${DTE_SHADES[j % DTE_SHADES.length].line} strokeWidth=${1.5}
                         dot=${false} activeDot=${false}
                         isAnimationActive=${false} />
              <//>`)}
            <${Area} type="linear" dataKey="pExpPos" stroke="#3ddc97" strokeWidth=${1.5}
                     fill="#1b4d3a" fillOpacity=${0.6} baseValue=${0}
                     dot=${false} activeDot=${false} isAnimationActive=${false} />
            <${Area} type="linear" dataKey="pExpNeg" stroke="#e0455e" strokeWidth=${1.5}
                     fill="#5c1e26" fillOpacity=${0.6} baseValue=${0}
                     dot=${false} activeDot=${false} isAnimationActive=${false} />
            <${Line} type="linear" dataKey="pT0" stroke="#f59e0b" dot=${false}
                     strokeWidth=${2} isAnimationActive=${false} name="t0" />
            <${Customized} component=${p => chartOverlay(p, ana,
              { tf, pos: scales.pos, neg: scales.neg, zoom: yZoom })} />
          <//>
        <//>`}
      </div>
      <div class="hdivider" onMouseDown=${dragChart}></div>
      ${ana.leg_stats ? html`<${PositionTable} stats=${ana.leg_stats} rollBasis=${ana.roll_basis}
                              hidden=${hidden} onToggle=${onToggle} spot=${ana.spot} />` : null}
      <${AdvisorPanel} account=${account} sel=${sel} />
    </div>`;
}

// LLM position-management analysis, run on demand. The backend builds the
// dossier (legs, greeks, roll history, 1yr stats) and calls the provider
// configured in .env; only the generated text reaches the browser.
const REC_META = {
  hold_collect_theta: { label: "hold · theta", color: "#2dd4a7" },
  roll:               { label: "roll",         color: "#7aa5ff" },
  adjust_directional: { label: "directional",  color: "#c084fc" },
  cut_losses:         { label: "cut losses",   color: "#ff5d73" },
  take_profits:       { label: "take profits", color: "#3ddc97" },
  other:              { label: "other",        color: "#8b97a8" },
};

const LLM_LABELS = { anthropic: "Claude", openai: "OpenAI", gemini: "Gemini", deepseek: "DeepSeek", kimi: "Kimi" };
const LLM_META = {
  anthropic: { icon: "🅰", color: "#c4a1e7" },
  openai:    { icon: "⚡", color: "#10a37f" },
  gemini:    { icon: "♦", color: "#4285f4" },
  deepseek:  { icon: "🐋", color: "#4f6ef7" },
  kimi:      { icon: "🌙", color: "#a78bfa" },
};
const LLM_ORDER = ["anthropic", "openai", "gemini", "deepseek", "kimi"];

function AdvisorPanel({ account, sel }) {
  const [loading, setLoading] = useState(false);
  const [hist, setHist] = useState([]);   // saved runs, newest first
  const [idx, setIdx] = useState(0);      // which run is displayed
  const [err, setErr] = useState(null);
  const [avail, setAvail] = useState({}); // provider -> key present
  const [prov, setProv] = useState("");   // selected provider name
  const [models, setModels] = useState([]); // valid models for selected provider
  const [model, setModel] = useState("");   // selected model name
  const res = idx >= 0 ? hist[idx] : null;
  // fetch the models the selected provider can actually use
  useEffect(() => {
    if (!prov || !avail[prov]) { setModels([]); setModel(""); return; }
    let alive = true;
    fetch(api(`/api/llm/models/${prov}`))
      .then(r => r.ok ? r.json() : {})
      .then(d => {
        if (!alive) return;
        const list = d.models || [];
        setModels(list);
        setModel(m => {
          if (m && list.some(x => x.id === m)) return m;
          const latest = hist.find(h => h.provider === prov);
          if (latest && latest.model && list.some(x => x.id === latest.model)) return latest.model;
          const rec = list.find(x => x.recommended) || list.find(x => x.id === d.default);
          return rec?.id || list[0]?.id || "";
        });
      })
      .catch(() => {});
    return () => { alive = false; };
  }, [prov, avail]);
  // which providers actually have API keys; default-select the backend's pick
  useEffect(() => {
    let alive = true;
    fetch(api("/api/health"))
      .then(r => r.ok ? r.json() : {})
      .then(d => {
        if (!alive) return;
        const llm = d.llm || {};
        const av = llm.available || {};
        setAvail(av);
        setProv(p => p && av[p] ? p
          : (llm.provider || LLM_ORDER.find(x => av[x]) || ""));
      })
      .catch(() => {});
    return () => { alive = false; };
  }, []);
  // load saved history so a refresh / new browser shows the last run
  useEffect(() => {
    setHist([]); setIdx(0); setErr(null); setLoading(false);
    if (!account || !sel) return;
    let alive = true;
    fetch(api(`/api/analyses/${account}/${sel}`))
      .then(r => r.ok ? r.json() : [])
      .then(h => {
        if (!alive || !Array.isArray(h)) return;
        setHist(h);
        // when switching positions, always surface the latest available run
        // regardless of which provider/model was selected before
        if (h.length && avail[h[0].provider]) {
          setProv(h[0].provider);
          setModel(h[0].model);
          setIdx(0);
        }
      })
      .catch(() => {});
    return () => { alive = false; };
  }, [account, sel, avail]);
  const run = async () => {
    setLoading(true); setErr(null);
    try {
      const params = new URLSearchParams();
      if (prov && avail[prov]) params.set("provider", prov);
      if (model) params.set("model", model);
      const qs = params.toString();
      const r = await fetch(api(`/api/analyze/${account}/${sel}${qs ? `?${qs}` : ""}`), { method: "POST" });
      const d = await r.json();
      if (d.ok) { setHist(h => [d, ...h]); setIdx(0); }
      else setErr((d.problems || [d.detail || "analysis failed"]).join("; "));
    } catch (e) {
      setErr(/fetch/i.test(e.message || "")
        ? "backend not reachable — is the app still running?"
        : (e.message || String(e)));
    }
    setLoading(false);
  };
  const ts = h => {
    const g = h && h.generated_at;
    if (!g) return "";
    try {
      const d = new Date(g);
      const weekday = d.toLocaleDateString("en-US", { weekday: "short" });
      const month = d.getMonth() + 1;
      const day = d.getDate();
      const h24 = d.getHours();
      const m = d.getMinutes().toString().padStart(2, "0");
      const ampm = h24 >= 12 ? "pm" : "am";
      const h12 = h24 % 12 || 12;
      return `(${weekday} ${month}/${day}, ${h12}:${m}${ampm})`;
    } catch { return g.replace("T", " ").slice(0, 16); }
  };
  const toBullets = text => {
    if (!text) return [];
    if (Array.isArray(text)) return text.filter(Boolean);
    return String(text).split(/(?<=[.!?])\s+/).map(s => s.trim()).filter(Boolean);
  };
  // backend returns ratings.{health,risk,pl} = {score: 1-10, label}; risk is
  // inverted (10 = severe), so flip it before picking green/yellow/red
  const rateCard = (title, r, invert) => {
    const score = r && r.score != null && isFinite(+r.score)
      ? Math.max(1, Math.min(10, Math.round(+r.score))) : null;
    const good = score == null ? null : (invert ? 11 - score : score);
    const color = good == null ? "#8b97a8"
      : good >= 7 ? "#3ddc97" : good >= 4 ? "#f5b94e" : "#ff5d73";
    return html`
      <div class="arate">
        <div class="rk">${title}</div>
        <div class="rv" style=${{ color }}>${score != null ? `${score}/10` : "—"}</div>
        <div class="rl">${(r && r.label) || ""}</div>
        <div class="bar"><i style=${{ width: `${(score || 0) * 10}%`, background: color }}></i></div>
      </div>`;
  };
  const bulletList = (items, key) => html`
    <ul>${items.map((b, i) => html`<li key=${`${key}-${i}`}>${b}</li>`)}</ul>`;
  return html`
    <div class="advisor">
      <div class="ahead">
        <h3>Position analysis</h3>
        ${prov && LLM_META[prov] ? html`<span class="llmdot" style=${{ background: LLM_META[prov].color }} title=${LLM_LABELS[prov]}></span>` : null}
        <select class="aprov" value=${prov} onChange=${e => {
          const p = e.target.value;
          if (p === prov) return;
          setProv(p);
          const i = hist.findIndex(h => h.provider === p);
          setIdx(i >= 0 ? i : -1);
          if (i >= 0) setModel(hist[i].model);
        }}>
          ${LLM_ORDER.map(p => html`
            <option key=${p} value=${p} disabled=${!avail[p]}>
              ${LLM_META[p].icon} ${LLM_LABELS[p]}${avail[p] ? "" : " (no key)"}</option>`)}
        </select>
        ${prov && avail[prov] && models.length ? html`
          <select class="aprov" value=${model} onChange=${e => setModel(e.target.value)}>
            ${models.map(m => html`<option key=${m.id} value=${m.id}>
              ${m.id}${m.input != null && m.output != null
                ? ` · $${m.input}/$${m.output} per 1M`
                : ""}${m.recommended ? " · default" : ""}
            </option>`)}
          </select>` : null}
        ${res ? html`
          <select class="meta ahist" value=${idx} onChange=${e => {
            const i = +e.target.value;
            setIdx(i);
            if (hist[i]) {
              setProv(hist[i].provider);
              setModel(hist[i].model);
            }
          }}>
            ${hist.map((h, i) => html`<option key=${i} value=${i}>${LLM_META[h.provider]?.icon || ""} ${ts(h)} · ${h.model}${i === 0 ? " · latest" : ""}</option>`)}
          </select>` : null}
        <button class="abtn" disabled=${loading} onClick=${run}>
          ${loading ? "Analyzing…" : (res ? "Update analysis" : "Get analysis")}</button>
      </div>
      ${err ? html`<div class="prob" style=${{marginTop:'10px'}}>${err}</div>` : null}
      ${res ? html`
        <div class="aratings">
          ${rateCard("Current health", (res.ratings || {}).health, false)}
          ${rateCard("Future risk", (res.ratings || {}).risk, true)}
          ${rateCard("P/L rating", (res.ratings || {}).pl, false)}
        </div>
        <div class="agrid">
          <div class="aquad">
            <h4>Summary</h4>
            ${bulletList(toBullets(res.summary), "sum")}
          </div>
          <div class="aquad">
            <h4>Outlook</h4>
            ${bulletList(toBullets(res.outlook), "out")}
          </div>
          <div class="aquad warn">
            <h4>Risks</h4>
            ${bulletList(toBullets(res.warnings), "risk")}
          </div>
          <div class="aquad">
            <h4>Key actions</h4>
            ${bulletList((res.recommendations || []).map(r => html`<b>${r.title}</b>${r.details ? ` — ${r.details}` : ""}`), "act")}
          </div>
        </div>
        ${(res.recommendations || []).map((r, i) => {
          const m = REC_META[r.type] || REC_META.other;
          return html`
            <div key=${i} class="rec" style=${{borderLeftColor: m.color}}>
              <span class="rtag" style=${{color: m.color}}>${m.label}</span>
              <span class="rbody"><b>${r.title}</b><div>${r.details}</div></span>
              <span class="conf">${r.confidence || ""}</span>
            </div>`;})}
        ${res.warnings && !toBullets(res.warnings).length ? html`<div class="awarn">⚠ ${res.warnings}</div>` : null}` : null}
      ${!res && !err && !loading ? html`<div class="adisc">
        ${prov && hist.length ? `${LLM_LABELS[prov] || prov} hasn't analyzed ${sel} yet — click Get analysis.`
          : html`Runs your configured LLM (set ANTHROPIC_API_KEY, OPENAI_API_KEY, or
            GEMINI_API_KEY in the app's .env; optional LLM_PROVIDER / LLM_MODEL)
            over the open legs, roll history, and trailing-1yr stats for ${sel}.`}</div>` : null}
      <div class="adisc">AI-generated decision support, not financial advice — nothing is executed.</div>
    </div>`;
}

function PositionTable({ stats, rollBasis, hidden, onToggle, spot }) {
  const isOff = c => hidden && c.legs.every(l => hidden.has(l.symbol));
  const rsb = detectRSB(stats, spot);
  const num = (v, d=2) => html`<span class="num ${v>0?'pos':v<0?'neg':''}">${fmt(v,d)}</span>`;
  const clusters = clusterLegs(stats);
  const sum = (ls, k) => ls.reduce((a, s) => a + s[k], 0);
  const tot = k => sum(stats, k);
  // how many option legs share each expiration, so a roll basis (which spans
  // the whole expiration) is only applied to a cluster that IS that whole
  // expiration — not to a same-expiry cluster split into sub-strategies
  const expLegCount = {};
  stats.forEach(s => { if (s.strike != null) expLegCount[s.expiration] = (expLegCount[s.expiration] || 0) + 1; });
  // group Trd Prc: roll-adjusted (from transaction history) when this cluster
  // is a full, rolled expiration; otherwise the current-legs per-unit price
  const groupTrd = c => {
    const exp = c.legs[0].expiration;
    const rb = rollBasis && rollBasis[exp];
    const isFullExp = c.legs.every(l => l.strike != null) && c.legs.length === expLegCount[exp];
    if (rb && isFullExp && rb.rolls > 0) return { val: rb.trd_prc, rolls: rb.rolls };
    return { val: grpPrice(c.legs, sTrd), rolls: 0 };
  };
  // cash-flow signed per-contract prices, tastytrade-style: debits red (long
  // pays to open, so negative trd prc), credits green; mark is the signed
  // per-unit position value
  const sTrd = s => (s.qty > 0 ? -1 : 1) * s.trd_prc;
  const sMrk = s => (s.qty > 0 ? 1 : -1) * s.mark;
  const sumBy = (ls, f) => ls.reduce((a, s) => a + f(s), 0);
  // a group's net price must weight each leg by its contract count and
  // normalize to one unit of the spread (÷ gcd of the quantities), so e.g.
  // a +2/-4/+2 butterfly reports the per-1x credit, not the raw leg-price sum
  const gcd2 = (a, b) => b ? gcd2(b, a % b) : a;
  const unitDiv = ls => ls.reduce((g, s) => gcd2(g, Math.abs(Math.round(s.qty))), 0) || 1;
  const grpPrice = (ls, f) =>
    ls.reduce((a, s) => a + f(s) * Math.abs(Math.round(s.qty)), 0) / unitDiv(ls);
  return html`
    <table class="pos">
      <thead><tr>
        <th>Leg</th><th>Trd Prc</th><th>Mrk</th><th>DTE</th><th>Δ</th><th>θ</th>
        <th>IV</th><th>Cst</th><th>Ext</th><th>P/L Open</th>
      </tr></thead>
      <tbody>
        ${clusters.map((c, ci) => { const off = isOff(c); return html`
          <${React.Fragment} key=${c.label + ":" + c.legs[0].symbol}>
            <tr class="grp ${off ? 'off' : ''}" title="click to toggle this strategy on the chart"
                onClick=${() => onToggle && onToggle(c.legs.map(l => l.symbol))}>
              <td><span class="vis">${off ? '○' : '●'}</span>${c.label}${(() => { const r = groupTrd(c).rolls;
                return r > 0 ? html`<span class="rollbadge">w/ ${r} ${r > 1 ? 'rolls' : 'roll'}</span>` : ''; })()}${ci === 0 && rsb ? html`<span class="rsbbadge">${rsb}</span>` : ""}</td>
              <td>${num(groupTrd(c).val)}</td>
              <td>${num(grpPrice(c.legs, sMrk))}</td>
              <td>${c.legs[0].strike != null ? c.legs[0].dte_days + "d" : "—"}</td>
              <td>${fmt(sum(c.legs, "delta"))}</td>
              <td>${num(sum(c.legs, "theta"))}</td>
              <td></td>
              <td>${num(sum(c.legs, "cost"))}</td>
              <td>${num(sum(c.legs, "ext"))}</td>
              <td>${num(sum(c.legs, "pl_open"))}</td>
            </tr>
            ${c.legs.map(s => html`
              <tr key=${s.symbol} class=${off ? 'off' : ''}>
                <td><${LegPills} l=${s} /></td>
                <td>${num(sTrd(s))}</td>
                <td>${num(sMrk(s))}</td>
                <td>${s.strike != null ? s.dte_days + "d" : "—"}</td>
                <td>${fmt(s.delta)}</td>
                <td>${num(s.theta)}</td>
                <td>${s.iv != null ? (s.iv * 100).toFixed(1) + "%" : "—"}</td>
                <td>${num(s.cost)}</td>
                <td>${num(s.ext)}</td>
                <td>${num(s.pl_open)}</td>
              </tr>`)}
          <//>`;})}
        <tr class="tot">
          <td>Σ</td><td></td><td></td><td></td>
          <td>${fmt(tot("delta"))}</td>
          <td>${num(tot("theta"))}</td>
          <td></td>
          <td>${num(tot("cost"))}</td>
          <td>${num(tot("ext"))}</td>
          <td>${num(tot("pl_open"))}</td>
        </tr>
      </tbody>
    </table>`;
}

function SetupHelp({ setup }) {
  const [secret, setSecret] = useState("");
  const [refresh, setRefresh] = useState("");
  const [env, setEnv] = useState("paper");
  const [saving, setSaving] = useState(false);
  const [saveErr, setSaveErr] = useState(null);
  const save = async (e) => {
    e.preventDefault();
    setSaving(true); setSaveErr(null);
    try {
      const r = await fetch(api("/api/setup/credentials"), {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({tt_secret: secret, tt_refresh: refresh, tt_env: env})
      });
      const s = await r.json();
      if (s.ok) location.reload();
      else setSaveErr(s.problems?.join("; ") || "save failed");
    } catch (err) {
      // "Failed to fetch" = nothing answered at all — the local backend is
      // gone (closed, killed, or blocked), not a credential problem
      setSaveErr(/fetch/i.test(err.message || "")
        ? "the Tastier app isn't running (or was closed) — relaunch it, refresh this page, and try again"
        : (err.message || String(err)));
    }
    setSaving(false);
  };
  return html`
    <div class="setupbox">
      <h2 style=${{marginTop:0}}>Setup needed (stage: ${setup.stage})</h2>
      ${setup.problems.map(p => html`<div key=${p} class="prob">✗ ${p}</div>`)}

      <form class="setupform" onSubmit=${save}>
        <label>TT_SECRET</label>
        <input type="password" value=${secret} onInput=${e=>setSecret(e.target.value)}
               placeholder="your_client_secret" required />
        <label>TT_REFRESH</label>
        <input type="password" value=${refresh} onInput=${e=>setRefresh(e.target.value)}
               placeholder="your_refresh_token" required />
        <label>Environment</label>
        <select value=${env} onChange=${e=>setEnv(e.target.value)}>
          <option value="paper">paper (sandbox / cert)</option>
          <option value="live">live</option>
        </select>
        <button type="submit" disabled=${saving}>
          ${saving ? "Saving…" : "Save credentials locally & connect"}
        </button>
        ${saveErr ? html`<div class="prob">${saveErr}</div>` : null}
      </form>

      <details class="setuphint">
        <summary>How do I get TT_SECRET and TT_REFRESH?</summary>
        <ol>
          <li>Log in to <strong>my.tastytrade.com</strong> (or the sandbox portal for paper).</li>
          <li>Go to <strong>Manage → My Profile → API → OAuth Applications</strong>.</li>
          <li>Create a personal OAuth app. Scopes: <strong>read only</strong> (do not enable trade).</li>
          <li>Generate a personal grant. Copy the <strong>Client Secret</strong> → TT_SECRET.</li>
          <li>Copy the <strong>Refresh Token</strong> → TT_REFRESH.</li>
          <li>Paste both above. They are stored only on this computer in your local app data folder.</li>
        </ol>
      </details>

      <p style=${{color:'var(--dim)',fontSize:'12px',marginTop:'16px'}}>
        You can also create/edit the <code>.env</code> file directly in your OS user-data
        folder (Windows: <code>%LOCALAPPDATA%\\Tastier\\.env</code>, macOS:
        <code>~/Library/Application Support/Tastier/.env</code>) and restart the app.
      </p>
      <button class="reload" onClick=${()=>location.reload()}>Re-check</button>
    </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
